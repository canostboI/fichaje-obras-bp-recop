<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Obras — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
<style>
  :root {
    --verde: #4caf50; --naranja: #ff9800; --rojo: #f44336; --azul: #2196f3;
    --bg: #111318; --bg2: #1a1d24; --bg3: #22262f; --borde: #2e3340;
    --texto: #e8eaf0; --texto2: #8b909e; --sidebar-w: 200px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--texto); min-height: 100vh; display: flex; }
  .sidebar { width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--borde); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; }
  .sidebar-brand { padding: 18px 16px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; justify-content: center; gap: 14px; }
  .sidebar-brand img { height: 22px; width: auto; opacity: 0.9; }
  .sidebar-section { padding: 18px 14px 6px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--texto2); }
  .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 14px; color: var(--texto2); text-decoration: none; border-radius: 8px; margin: 2px 8px; transition: background 0.15s, color 0.15s; }
  .sidebar a:hover { background: var(--bg3); color: var(--texto); }
  .sidebar a.activo { background: var(--bg3); color: var(--texto); font-weight: 600; }
  .sidebar a .ico { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-bottom { margin-top: auto; padding: 16px; border-top: 1px solid var(--borde); }
  .btn-salir { width: 100%; background: transparent; border: 1px solid var(--borde); color: var(--texto2); padding: 9px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; text-align: left; display: flex; align-items: center; gap: 8px; }
  .btn-salir:hover { background: var(--bg3); color: var(--texto); }
  .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
  .topbar { padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 22px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
  .contenido { padding: 0 28px 28px; }
  .btn-primario { background: var(--azul); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-primario:hover { opacity: 0.9; }
  .btn-secundario { background: transparent; color: var(--texto2); border: 1px solid var(--borde); padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-secundario:hover { background: var(--bg3); color: var(--texto); }
  .seccion { background: var(--bg2); border: 1px solid var(--borde); border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 11px 20px; font-size: 11px; font-weight: 700; color: var(--texto2); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--borde); }
  td { padding: 13px 20px; border-bottom: 1px solid var(--borde); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .pill.verde { background: rgba(76,175,80,0.15); color: var(--verde); }
  .pill.gris { background: rgba(139,144,158,0.15); color: var(--texto2); }
  .pill.azul { background: rgba(33,150,243,0.15); color: var(--azul); }
  .pill.naranja { background: rgba(255,152,0,0.15); color: var(--naranja); }
  .acciones { display: flex; gap: 8px; flex-wrap: wrap; }
  .vacio { padding: 40px 20px; text-align: center; color: var(--texto2); font-size: 14px; }
  .cargando { padding: 40px 20px; text-align: center; color: var(--texto2); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.visible { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--borde); border-radius: 14px; padding: 28px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 22px; }
  .campo { margin-bottom: 16px; }
  .campo label { display: block; font-size: 12px; font-weight: 600; color: var(--texto2); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
  .campo input, .campo select { width: 100%; background: var(--bg3); border: 1px solid var(--borde); border-radius: 8px; color: var(--texto); font-size: 14px; padding: 10px 12px; font-family: inherit; }
  .campo input:focus, .campo select:focus { outline: none; border-color: var(--azul); }
  .campo-fila { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-acciones { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .error-modal { background: rgba(244,67,54,0.1); color: var(--rojo); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none; }
  .modal-qr { text-align: center; }
  .url-qr { font-size: 12px; color: var(--texto2); word-break: break-all; margin: 14px 0; padding: 10px; background: var(--bg3); border-radius: 8px; }
  #qr-canvas { margin: 16px auto; display: block; border-radius: 8px; background: white; padding: 8px; }

  .equipo-lista { margin-bottom: 20px; }
  .equipo-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg3); border-radius: 8px; margin-bottom: 8px; }
  .equipo-item-info { display: flex; flex-direction: column; gap: 2px; }
  .equipo-item-nombre { font-size: 14px; font-weight: 600; }
  .equipo-item-email { font-size: 12px; color: var(--texto2); }
  .equipo-vacio { color: var(--texto2); font-size: 13px; padding: 12px 0; }
  .separador { border: none; border-top: 1px solid var(--borde); margin: 20px 0; }
  .equipo-anadir h3 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--texto2); margin-bottom: 14px; }
  .btn-peligro { background: transparent; color: var(--rojo); border: 1px solid rgba(244,67,54,0.3); padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; }
  .btn-peligro:hover { background: rgba(244,67,54,0.1); }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <img src="../assets/logos/bosch_pascual_logo_white.svg" alt="Bosch Pascual">
    <img src="../assets/logos/recop_logo_white.svg" alt="Rècop">
  </div>
  <div class="sidebar-section">Principal</div>
  <a href="index.html"><span class="ico">📊</span> Dashboard</a>
  <div class="sidebar-section">Gestión</div>
  <a href="obras.html" class="activo"><span class="ico">🏗</span> Obras</a>
  <a href="trabajadores.html"><span class="ico">👷</span> Trabajadores</a>
  <a href="#"><span class="ico">🏢</span> Empresas</a>
  <a href="fichajes.html"><span class="ico">📋</span> Fichajes</a>
  <a href="incidencias.html"><span class="ico">⚠️</span> Incidencias</a>
  <a href="reglas.html"><span class="ico">📋</span> Reglas documentales</a>
  <div class="sidebar-bottom">
    <button class="btn-salir" id="btn-salir">↩ Cerrar sesión</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1>Obras</h1>
    <button class="btn-primario" id="btn-nueva">+ Nueva obra</button>
  </div>
  <div class="contenido">
    <div class="seccion">
      <div id="tabla-obras"><div class="cargando">Cargando…</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-obra">
  <div class="modal">
    <h2 id="modal-titulo">Nueva obra</h2>
    <div class="error-modal" id="error-modal"></div>

    <div class="campo">
      <label>Nombre de la obra</label>
      <input type="text" id="f-nombre" placeholder="Ej: Edificio Torres 3">
    </div>

    <div class="campo">
      <label>Dirección</label>
      <input type="text" id="f-direccion" placeholder="Calle, ciudad">
    </div>

    <div class="campo-fila">
      <div class="campo">
        <label>Latitud</label>
        <input type="number" id="f-latitud" placeholder="41.1234" step="0.0001">
      </div>
      <div class="campo">
        <label>Longitud</label>
        <input type="number" id="f-longitud" placeholder="2.1234" step="0.0001">
      </div>
    </div>

    <div class="campo">
      <label>Radio GPS (metros)</label>
      <input type="number" id="f-radio" placeholder="100" min="10" max="1000">
    </div>

    <div class="campo-fila">
      <div class="campo">
        <label>Hora entrada</label>
        <input type="time" id="f-entrada">
      </div>
      <div class="campo">
        <label>Hora salida</label>
        <input type="time" id="f-salida">
      </div>
    </div>

    <div class="campo">
      <label>Empresa / Marca</label>
      <select id="f-empresa">
        <option value="bosch_pascual">Bosch Pascual</option>
        <option value="recop">RECOP</option>
      </select>
    </div>

    <div class="campo">
      <label>Estado</label>
      <select id="f-activa">
        <option value="true">Activa</option>
        <option value="false">Inactiva</option>
      </select>
    </div>

    <div class="modal-acciones">
      <button class="btn-secundario" id="btn-cancelar">Cancelar</button>
      <button class="btn-primario" id="btn-guardar">Guardar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-qr">
  <div class="modal modal-qr">
    <h2 id="qr-titulo">QR de la obra</h2>
    <div class="url-qr" id="qr-url"></div>
    <canvas id="qr-canvas"></canvas>
    <div class="modal-acciones">
      <button class="btn-secundario" id="btn-cerrar-qr">Cerrar</button>
      <a id="btn-descargar-qr" class="btn-primario" download="qr-obra.png" style="text-decoration:none;">Descargar QR</a>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-equipo">
  <div class="modal">
    <h2 id="equipo-titulo">Equipo de la obra</h2>
    <div class="error-modal" id="error-equipo"></div>

    <div class="equipo-lista" id="equipo-lista">
      <div class="cargando">Cargando…</div>
    </div>

    <hr class="separador">

    <div class="equipo-anadir">
      <h3>Añadir usuario</h3>
      <div class="campo">
        <label>Usuario</label>
        <select id="eq-usuario">
          <option value="">Selecciona un usuario…</option>
        </select>
      </div>
      <div class="campo">
        <label>Rol en la obra</label>
        <select id="eq-rol">
          <option value="jefe_obra">Jefe de obra</option>
          <option value="encargado">Encargado</option>
        </select>
      </div>
    </div>

    <div class="modal-acciones">
      <button class="btn-secundario" id="btn-cerrar-equipo">Cerrar</button>
      <button class="btn-primario" id="btn-anadir-equipo">Añadir</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://istrnsicleopzbsrapsw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzdHJuc2ljbGVvcHpic3JhcHN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTIxMTYsImV4cCI6MjA5MTM4ODExNn0.5UXV2LWPXmbfLI7rKpZSG9YBzZsesjckHnhQabA0mTY';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let obraEditandoId = null;
let obraEquipoId = null;
let todosUsuarios = [];
let todasObras = [];

(async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '../'; return; }

  const { data: u } = await sb
    .from('usuarios_app')
    .select('rol')
    .eq('auth_user_id', session.user.id)
    .single();

  if (!u || u.rol !== 'admin') { window.location.href = '../'; return; }

  await cargarObras();
  await cargarUsuarios();
})();

document.getElementById('btn-salir').onclick = async () => {
  await sb.auth.signOut();
  window.location.href = '../';
};

async function cargarObras() {
  const { data, error } = await sb
    .from('obras')
    .select('id, nombre, direccion, latitud, longitud, empresa_marca, radio_gps, hora_entrada_default, hora_salida_default, activa')
    .order('nombre');

  if (error) {
    document.getElementById('tabla-obras').innerHTML = '<div class="vacio">Error al cargar obras</div>';
    return;
  }

  todasObras = data || [];

  if (todasObras.length === 0) {
    document.getElementById('tabla-obras').innerHTML = '<div class="vacio">No hay obras todavía</div>';
    return;
  }

  document.getElementById('tabla-obras').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Dirección</th>
          <th>Empresa</th>
          <th>Radio GPS</th>
          <th>Horario</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        ${todasObras.map(o => `
          <tr>
            <td><strong>${esc(o.nombre)}</strong></td>
            <td>${esc(o.direccion || '—')}</td>
            <td>${esc(o.empresa_marca || '—')}</td>
            <td>${esc(o.radio_gps || '—')}m</td>
            <td>${hora(o.hora_entrada_default)} – ${hora(o.hora_salida_default)}</td>
            <td><span class="pill ${o.activa ? 'verde' : 'gris'}">${o.activa ? 'Activa' : 'Inactiva'}</span></td>
            <td>
              <div class="acciones">
                <button class="btn-secundario" onclick="abrirEquipoPorId('${o.id}')">👥 Equipo</button>
                <button class="btn-secundario" onclick="abrirQRPorId('${o.id}')">QR</button>
                <button class="btn-secundario" onclick="abrirEditarPorId('${o.id}')">Editar</button>
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

async function cargarUsuarios() {
  const { data } = await sb
    .from('usuarios_app')
    .select('id, nombre, email, rol')
    .eq('activo', true)
    .in('rol', ['jefe_obra', 'encargado'])
    .order('nombre');

  todosUsuarios = data || [];
}

document.getElementById('btn-nueva').onclick = () => {
  obraEditandoId = null;
  document.getElementById('modal-titulo').textContent = 'Nueva obra';
  document.getElementById('f-nombre').value = '';
  document.getElementById('f-direccion').value = '';
  document.getElementById('f-latitud').value = '';
  document.getElementById('f-longitud').value = '';
  document.getElementById('f-radio').value = '100';
  document.getElementById('f-entrada').value = '08:00';
  document.getElementById('f-salida').value = '18:00';
  document.getElementById('f-empresa').value = 'bosch_pascual';
  document.getElementById('f-activa').value = 'true';
  ocultarError();
  document.getElementById('modal-obra').classList.add('visible');
};

function abrirEditarPorId(id) {
  const o = todasObras.find(x => x.id === id);
  if (!o) {
    alert('No se ha encontrado la obra.');
    return;
  }

  obraEditandoId = o.id;
  document.getElementById('modal-titulo').textContent = 'Editar obra';
  document.getElementById('f-nombre').value = o.nombre || '';
  document.getElementById('f-direccion').value = o.direccion || '';
  document.getElementById('f-latitud').value = o.latitud || '';
  document.getElementById('f-longitud').value = o.longitud || '';
  document.getElementById('f-radio').value = o.radio_gps || 100;
  document.getElementById('f-entrada').value = (o.hora_entrada_default || '08:00:00').substring(0, 5);
  document.getElementById('f-salida').value = (o.hora_salida_default || '18:00:00').substring(0, 5);
  document.getElementById('f-empresa').value = o.empresa_marca || 'bosch_pascual';
  document.getElementById('f-activa').value = String(o.activa);
  ocultarError();
  document.getElementById('modal-obra').classList.add('visible');
}

document.getElementById('btn-cancelar').onclick = () => {
  document.getElementById('modal-obra').classList.remove('visible');
};

document.getElementById('btn-guardar').onclick = async () => {
  const nombre = document.getElementById('f-nombre').value.trim();
  const direccion = document.getElementById('f-direccion').value.trim();
  const latitudRaw = document.getElementById('f-latitud').value;
  const longitudRaw = document.getElementById('f-longitud').value;
  const radioRaw = document.getElementById('f-radio').value;
  const entradaRaw = document.getElementById('f-entrada').value;
  const salidaRaw = document.getElementById('f-salida').value;
  const empresa_marca = document.getElementById('f-empresa').value;
  const activa = document.getElementById('f-activa').value === 'true';

  const latitud = parseFloat(latitudRaw);
  const longitud = parseFloat(longitudRaw);
  const radio_gps = parseInt(radioRaw, 10);

  if (!nombre) { mostrarError('El nombre es obligatorio.'); return; }
  if (isNaN(latitud) || isNaN(longitud)) { mostrarError('Las coordenadas son obligatorias.'); return; }
  if (isNaN(radio_gps)) { mostrarError('El radio GPS es obligatorio.'); return; }
  if (!entradaRaw || !salidaRaw) { mostrarError('El horario es obligatorio.'); return; }

  const payload = {
    nombre,
    direccion,
    latitud: Number(latitud.toFixed(4)),
    longitud: Number(longitud.toFixed(4)),
    radio_gps,
    hora_entrada_default: entradaRaw + ':00',
    hora_salida_default: salidaRaw + ':00',
    empresa_marca,
    activa
  };

  let error;

  if (obraEditandoId) {
    ({ error } = await sb.from('obras').update(payload).eq('id', obraEditandoId));
  } else {
    ({ error } = await sb.from('obras').insert(payload));
  }

  if (error) {
    mostrarError('Error al guardar: ' + error.message);
    return;
  }

  document.getElementById('modal-obra').classList.remove('visible');
  await cargarObras();
};

function abrirQRPorId(id) {
  const o = todasObras.find(x => x.id === id);
  if (!o) {
    alert('No se ha encontrado la obra.');
    return;
  }

  const url = `https://canostboi.github.io/fichaje-obras-bp-recop/fichaje/?obra=${o.id}`;
  document.getElementById('qr-titulo').textContent = 'QR — ' + (o.nombre || 'Obra');
  document.getElementById('qr-url').textContent = url;

  const canvas = document.getElementById('qr-canvas');
  new QRious({
    element: canvas,
    value: url,
    size: 220,
    background: 'white',
    foreground: 'black'
  });

  const btn = document.getElementById('btn-descargar-qr');
  btn.href = canvas.toDataURL('image/png');
  btn.download = 'qr-' + limpiarNombreArchivo(o.nombre || 'obra') + '.png';

  document.getElementById('modal-qr').classList.add('visible');
}

document.getElementById('btn-cerrar-qr').onclick = () => {
  document.getElementById('modal-qr').classList.remove('visible');
};

async function abrirEquipoPorId(id) {
  const o = todasObras.find(x => x.id === id);
  if (!o) {
    alert('No se ha encontrado la obra.');
    return;
  }

  obraEquipoId = o.id;
  document.getElementById('equipo-titulo').textContent = '👥 Equipo — ' + (o.nombre || 'Obra');
  document.getElementById('error-equipo').style.display = 'none';
  document.getElementById('modal-equipo').classList.add('visible');

  await cargarEquipo();
  rellenarSelectUsuarios();
}

async function cargarEquipo() {
  document.getElementById('equipo-lista').innerHTML = '<div class="cargando">Cargando…</div>';

  const { data, error } = await sb
    .from('usuarios_obra')
    .select('id, rol_en_obra, usuario_app:usuario_app_id(id, nombre, email)')
    .eq('obra_id', obraEquipoId);

  if (error) {
    document.getElementById('equipo-lista').innerHTML = '<div class="equipo-vacio">Error al cargar el equipo.</div>';
    return;
  }

  if (!data || data.length === 0) {
    document.getElementById('equipo-lista').innerHTML = '<div class="equipo-vacio">Esta obra no tiene equipo asignado todavía.</div>';
    return;
  }

  document.getElementById('equipo-lista').innerHTML = data.map(item => `
    <div class="equipo-item">
      <div class="equipo-item-info">
        <span class="equipo-item-nombre">${esc(item.usuario_app?.nombre || '—')}</span>
        <span class="equipo-item-email">
          ${esc(item.usuario_app?.email || '')}
          ·
          <span class="pill ${item.rol_en_obra === 'jefe_obra' ? 'azul' : 'naranja'}">
            ${item.rol_en_obra === 'jefe_obra' ? 'Jefe de obra' : 'Encargado'}
          </span>
        </span>
      </div>
      <button class="btn-peligro" onclick="quitarDelEquipo('${item.id}')">Quitar</button>
    </div>
  `).join('');
}

function rellenarSelectUsuarios() {
  const select = document.getElementById('eq-usuario');
  select.innerHTML = '<option value="">Selecciona un usuario…</option>';

  todosUsuarios.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.id;
    opt.textContent = `${u.nombre || 'Sin nombre'} (${u.email || 'sin email'})`;
    select.appendChild(opt);
  });
}

document.getElementById('btn-anadir-equipo').onclick = async () => {
  const usuarioAppId = document.getElementById('eq-usuario').value;
  const rol = document.getElementById('eq-rol').value;
  const errEl = document.getElementById('error-equipo');
  errEl.style.display = 'none';

  if (!usuarioAppId) {
    errEl.textContent = 'Selecciona un usuario.';
    errEl.style.display = 'block';
    return;
  }

  const { error } = await sb.from('usuarios_obra').insert({
    usuario_app_id: usuarioAppId,
    obra_id: obraEquipoId,
    rol_en_obra: rol
  });

  if (error) {
    errEl.textContent = error.code === '23505'
      ? 'Este usuario ya está asignado a esta obra.'
      : 'Error: ' + error.message;
    errEl.style.display = 'block';
    return;
  }

  document.getElementById('eq-usuario').value = '';
  await cargarEquipo();
};

async function quitarDelEquipo(usuariosObraId) {
  if (!confirm('¿Quitar este usuario de la obra?')) return;

  const { error } = await sb
    .from('usuarios_obra')
    .delete()
    .eq('id', usuariosObraId);

  if (error) {
    const errEl = document.getElementById('error-equipo');
    errEl.textContent = 'Error al quitar: ' + error.message;
    errEl.style.display = 'block';
    return;
  }

  await cargarEquipo();
}

document.getElementById('btn-cerrar-equipo').onclick = () => {
  document.getElementById('modal-equipo').classList.remove('visible');
};

function mostrarError(msg) {
  const el = document.getElementById('error-modal');
  el.textContent = msg;
  el.style.display = 'block';
}

function ocultarError() {
  document.getElementById('error-modal').style.display = 'none';
}

function esc(txt) {
  const d = document.createElement('div');
  d.textContent = String(txt || '');
  return d.innerHTML;
}

function hora(t) {
  if (!t) return '—';
  return String(t).substring(0, 5);
}

function limpiarNombreArchivo(txt) {
  return String(txt || 'obra')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

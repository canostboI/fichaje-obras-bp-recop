<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Fichaje Obras</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --azul: #1e3a5f;
    --verde: #2e7d32;
    --naranja: #e67e22;
    --rojo: #c0392b;
    --gris-fondo: #f4f6f8;
    --gris-borde: #d0d7de;
    --texto: #1a1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--gris-fondo);
    color: var(--texto);
    min-height: 100vh;
  }

  /* CABECERA */
  .topbar {
    background: var(--azul);
    color: white;
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar h1 { font-size: 17px; font-weight: 600; }
  .topbar .usuario { font-size: 13px; opacity: 0.8; }
  .btn-salir {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  .btn-salir:hover { background: rgba(255,255,255,0.25); }

  /* CONTENIDO */
  .contenido {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 20px;
  }

  /* TARJETAS RESUMEN */
  .resumen {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat {
    background: white;
    border-radius: 12px;
    padding: 20px 22px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    border-left: 4px solid var(--azul);
  }
  .stat.verde  { border-left-color: var(--verde); }
  .stat.naranja{ border-left-color: var(--naranja); }
  .stat.rojo   { border-left-color: var(--rojo); }
  .stat .numero {
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat .etiqueta { font-size: 13px; color: #666; }

  /* SECCIONES */
  .seccion {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    margin-bottom: 24px;
    overflow: hidden;
  }
  .seccion-cabecera {
    padding: 16px 20px;
    border-bottom: 1px solid var(--gris-borde);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .seccion-cabecera h2 { font-size: 15px; font-weight: 600; }
  .badge {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .badge.verde  { background: #e8f5e9; color: var(--verde); }
  .badge.naranja{ background: #fff4e6; color: var(--naranja); }
  .badge.rojo   { background: #fdecea; color: var(--rojo); }
  .badge.azul   { background: #e3eaf4; color: var(--azul); }

  /* TABLA */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th {
    text-align: left;
    padding: 10px 20px;
    font-size: 12px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    border-bottom: 1px solid var(--gris-borde);
  }
  td {
    padding: 12px 20px;
    border-bottom: 1px solid #f0f0f0;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  .pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .pill.verde  { background: #e8f5e9; color: var(--verde); }
  .pill.naranja{ background: #fff4e6; color: var(--naranja); }
  .pill.rojo   { background: #fdecea; color: var(--rojo); }

  .vacio {
    padding: 28px 20px;
    text-align: center;
    color: #aaa;
    font-size: 14px;
  }

  .cargando {
    padding: 28px 20px;
    text-align: center;
    color: #aaa;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>Panel Admin — Fichaje Obras</h1>
  <div style="display:flex;align-items:center;gap:14px;">
    <span class="usuario" id="usuario-email"></span>
    <button class="btn-salir" id="btn-salir">Cerrar sesión</button>
  </div>
</div>

<div class="contenido">

  <!-- TARJETAS RESUMEN -->
  <div class="resumen">
    <div class="stat azul">
      <div class="numero" id="stat-fichajes">—</div>
      <div class="etiqueta">Fichajes hoy</div>
    </div>
    <div class="stat verde">
      <div class="numero" id="stat-obras">—</div>
      <div class="etiqueta">Obras activas</div>
    </div>
    <div class="stat rojo">
      <div class="numero" id="stat-rojos">—</div>
      <div class="etiqueta">Trabajadores en rojo</div>
    </div>
    <div class="stat naranja">
      <div class="numero" id="stat-incidencias">—</div>
      <div class="etiqueta">Incidencias hoy</div>
    </div>
  </div>

  <!-- FICHAJES DE HOY -->
  <div class="seccion">
    <div class="seccion-cabecera">
      <h2>Fichajes de hoy</h2>
      <span class="badge azul" id="badge-fichajes">cargando…</span>
    </div>
    <div id="tabla-fichajes"><div class="cargando">Cargando…</div></div>
  </div>

  <!-- OBRAS ACTIVAS -->
  <div class="seccion">
    <div class="seccion-cabecera">
      <h2>Obras activas</h2>
      <span class="badge verde" id="badge-obras">cargando…</span>
    </div>
    <div id="tabla-obras"><div class="cargando">Cargando…</div></div>
  </div>

  <!-- TRABAJADORES EN ROJO -->
  <div class="seccion">
    <div class="seccion-cabecera">
      <h2>Trabajadores con documentación en rojo</h2>
      <span class="badge rojo" id="badge-rojos">cargando…</span>
    </div>
    <div id="tabla-rojos"><div class="cargando">Cargando…</div></div>
  </div>

  <!-- INCIDENCIAS -->
  <div class="seccion">
    <div class="seccion-cabecera">
      <h2>Incidencias recientes</h2>
      <span class="badge naranja" id="badge-incidencias">cargando…</span>
    </div>
    <div id="tabla-incidencias"><div class="cargando">Cargando…</div></div>
  </div>

</div>

<script src="../js/supabase-client.js"></script>
<script>
const sb = window.supabaseClient;

// Verificar sesión y rol
(async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '../'; return; }

  const { data: usuario } = await sb.from('usuarios_app').select('rol, nombre').single();
  if (!usuario || usuario.rol !== 'admin') { window.location.href = '../'; return; }

  document.getElementById('usuario-email').textContent =
    usuario.nombre || session.user.email;

  await Promise.all([
    cargarFichajes(),
    cargarObras(),
    cargarRojos(),
    cargarIncidencias()
  ]);
})();

document.getElementById('btn-salir').addEventListener('click', async () => {
  await sb.auth.signOut();
  window.location.href = '../';
});

// ── FICHAJES DE HOY ──────────────────────────────────────
async function cargarFichajes() {
  const hoy = new Date().toISOString().split('T')[0];
  const { data, error } = await sb
    .from('fichajes')
    .select('tipo, hora, trabajador:trabajador_id(nombre, apellidos), obra:obra_id(nombre)')
    .gte('hora', hoy + 'T00:00:00')
    .lte('hora', hoy + 'T23:59:59')
    .order('hora', { ascending: false })
    .limit(50);

  const n = data ? data.length : 0;
  document.getElementById('stat-fichajes').textContent = n;
  document.getElementById('badge-fichajes').textContent = n + ' registros';

  if (error || !data || data.length === 0) {
    document.getElementById('tabla-fichajes').innerHTML = '<div class="vacio">No hay fichajes hoy</div>';
    return;
  }

  document.getElementById('tabla-fichajes').innerHTML = `
    <table>
      <thead><tr>
        <th>Trabajador</th><th>Obra</th><th>Tipo</th><th>Hora</th>
      </tr></thead>
      <tbody>
        ${data.map(f => `
          <tr>
            <td>${esc(f.trabajador?.nombre)} ${esc(f.trabajador?.apellidos)}</td>
            <td>${esc(f.obra?.nombre)}</td>
            <td><span class="pill ${f.tipo === 'entrada' ? 'verde' : 'azul'}">${f.tipo}</span></td>
            <td>${formatHora(f.hora)}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── OBRAS ACTIVAS ─────────────────────────────────────────
async function cargarObras() {
  const { data, error } = await sb
    .from('obras')
    .select('nombre, direccion, empresa_marca')
    .eq('activa', true)
    .order('nombre');

  const n = data ? data.length : 0;
  document.getElementById('stat-obras').textContent = n;
  document.getElementById('badge-obras').textContent = n + ' obras';

  if (error || !data || data.length === 0) {
    document.getElementById('tabla-obras').innerHTML = '<div class="vacio">No hay obras activas</div>';
    return;
  }

  document.getElementById('tabla-obras').innerHTML = `
    <table>
      <thead><tr>
        <th>Nombre</th><th>Dirección</th><th>Empresa</th>
      </tr></thead>
      <tbody>
        ${data.map(o => `
          <tr>
            <td>${esc(o.nombre)}</td>
            <td>${esc(o.direccion || '—')}</td>
            <td>${esc(o.empresa_marca || '—')}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── TRABAJADORES EN ROJO ──────────────────────────────────
async function cargarRojos() {
  const { data, error } = await sb
    .from('validaciones_obra')
    .select('estado, motivos, trabajador:trabajador_id(nombre, apellidos, dni), obra:obra_id(nombre)')
    .eq('estado', 'rojo')
    .limit(50);

  const n = data ? data.length : 0;
  document.getElementById('stat-rojos').textContent = n;
  document.getElementById('badge-rojos').textContent = n + ' trabajadores';

  if (error || !data || data.length === 0) {
    document.getElementById('tabla-rojos').innerHTML = '<div class="vacio">Ningún trabajador en rojo ✓</div>';
    return;
  }

  document.getElementById('tabla-rojos').innerHTML = `
    <table>
      <thead><tr>
        <th>Trabajador</th><th>DNI</th><th>Obra</th><th>Motivos</th>
      </tr></thead>
      <tbody>
        ${data.map(v => `
          <tr>
            <td>${esc(v.trabajador?.nombre)} ${esc(v.trabajador?.apellidos)}</td>
            <td>${esc(v.trabajador?.dni)}</td>
            <td>${esc(v.obra?.nombre)}</td>
            <td>${Array.isArray(v.motivos) ? v.motivos.map(m => esc(m)).join(', ') : '—'}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── INCIDENCIAS RECIENTES ─────────────────────────────────
async function cargarIncidencias() {
  const hoy = new Date().toISOString().split('T')[0];
  const { data, error } = await sb
    .from('incidencias')
    .select('tipo, descripcion, creado_en, trabajador:trabajador_id(nombre, apellidos), obra:obra_id(nombre)')
    .gte('creado_en', hoy + 'T00:00:00')
    .order('creado_en', { ascending: false })
    .limit(50);

  const n = data ? data.length : 0;
  document.getElementById('stat-incidencias').textContent = n;
  document.getElementById('badge-incidencias').textContent = n + ' hoy';

  if (error || !data || data.length === 0) {
    document.getElementById('tabla-incidencias').innerHTML = '<div class="vacio">No hay incidencias hoy</div>';
    return;
  }

  document.getElementById('tabla-incidencias').innerHTML = `
    <table>
      <thead><tr>
        <th>Trabajador</th><th>Obra</th><th>Tipo</th><th>Descripción</th><th>Hora</th>
      </tr></thead>
      <tbody>
        ${data.map(i => `
          <tr>
            <td>${esc(i.trabajador?.nombre)} ${esc(i.trabajador?.apellidos)}</td>
            <td>${esc(i.obra?.nombre)}</td>
            <td><span class="pill naranja">${esc(i.tipo)}</span></td>
            <td>${esc(i.descripcion || '—')}</td>
            <td>${formatHora(i.creado_en)}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── UTILIDADES ────────────────────────────────────────────
function esc(txt) {
  const d = document.createElement('div');
  d.textContent = String(txt || '');
  return d.innerHTML;
}

function formatHora(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}
</script>
</body>
</html>

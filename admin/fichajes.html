  :root {
    --verde: #4caf50; --naranja: #ff9800; --rojo: #f44336; --azul: #2196f3;
    --bg: #111318; --bg2: #1a1d24; --bg3: #22262f; --borde: #2e3340;
    --texto: #e8eaf0; --texto2: #8b909e; --sidebar-w: 200px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--texto); min-height: 100vh; display: flex; }
  .sidebar { width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--borde); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; }
  .sidebar-brand { padding: 18px 16px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; justify-content: center; gap: 14px; }
  .sidebar-brand img { height: 22px; width: auto; opacity: 0.9; }
  .sidebar-section { padding: 18px 14px 6px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--texto2); }
  .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 14px; color: var(--texto2); text-decoration: none; border-radius: 8px; margin: 2px 8px; transition: background 0.15s, color 0.15s; }
  .sidebar a:hover { background: var(--bg3); color: var(--texto); }
  .sidebar a.activo { background: var(--bg3); color: var(--texto); font-weight: 600; }
  .sidebar a .ico { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-bottom { margin-top: auto; padding: 16px; border-top: 1px solid var(--borde); }
  .btn-salir { width: 100%; background: transparent; border: 1px solid var(--borde); color: var(--texto2); padding: 9px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; text-align: left; display: flex; align-items: center; gap: 8px; }
  .btn-salir:hover { background: var(--bg3); color: var(--texto); }
  .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
  .topbar { padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 22px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
  .contenido { padding: 0 28px 28px; }
  .barra-filtros { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .barra-filtros input, .barra-filtros select {
    background: var(--bg2); border: 1px solid var(--borde); border-radius: 8px;

  .barra-filtros input[type="month"] { width: 160px; color-scheme: dark; }
  .barra-filtros select { width: 230px; }
  .barra-filtros input:focus, .barra-filtros select:focus { outline: none; border-color: var(--azul); }
  .btn-secundario { background: transparent; color: var(--texto2); border: 1px solid var(--borde); padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-secundario:hover { background: var(--bg3); color: var(--texto); }
  .btn-exportar { background: var(--verde); color: white; border: none; padding: 9px 15px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-exportar:hover { opacity: 0.9; }
  .btn-exportar:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg-export { font-size: 12px; color: var(--texto2); }

  .seccion { background: var(--bg2); border: 1px solid var(--borde); border-radius: 10px; overflow: hidden; }
  .seccion-cab { padding: 14px 20px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; justify-content: space-between; }
  .seccion-cab h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: rgba(33,150,243,0.15); color: var(--azul); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 11px 20px; font-size: 11px; font-weight: 700; color: var(--texto2); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--borde); }

<script>

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

(async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '../'; return; }

  const { data: u } = await sb.from('usuarios_app')
    .select('rol')

    .single();

  if (!u || u.rol !== 'admin') { window.location.href = '../'; return; }

  document.getElementById('filtro-fecha').value = fechaHoy();
  document.getElementById('filtro-mes').value = mesActual();

})();

document.getElementById('btn-salir').onclick = async () => {
  await sb.auth.signOut();
  window.location.href = '../';

async function cargarObras() {
  const { data } = await sb
    .from('obras')
    .select('id, nombre')
    .eq('activa', true)
    .order('nombre');

  const select = document.getElementById('filtro-obra');

  (data || []).forEach(o => {
    const opt = document.createElement('option');
    opt.value = o.id;
    opt.textContent = o.nombre;
    select.appendChild(opt);
  });
}

document.getElementById('btn-buscar').onclick = buscar;
document.getElementById('btn-hoy').onclick = () => {
  document.getElementById('filtro-fecha').value = fechaHoy();
  buscar();
};
document.getElementById('btn-exportar').onclick = exportarExcelMensual;

async function buscar() {
  document.getElementById('tabla-fichajes').innerHTML = '<div class="cargando">Cargando…</div>';

  const fecha  = document.getElementById('filtro-fecha').value;
  const obraId = document.getElementById('filtro-obra').value;

  let query = sb
    .from('fichajes')
    .select('id, tipo, hora, cierre_automatico, es_tarde, fuera_de_zona, es_manual, origen, corregido_por, trabajador:trabajador_id(nombre, apellidos, dni), obra:obra_id(nombre)')
    .order('hora', { ascending: false })
    .limit(200);

  if (fecha) {
    // I1: rango del día en hora local del navegador, enviado como UTC ISO
    const [y, m, d] = fecha.split('-').map(Number);
    const desde = new Date(y, m - 1, d, 0, 0, 0, 0);
    const hasta = new Date(y, m - 1, d, 23, 59, 59, 999);
    query = query.gte('hora', desde.toISOString()).lte('hora', hasta.toISOString());
  }

  if (obraId) {
    query = query.eq('obra_id', obraId);
  }

  const { data, error } = await query;

  if (error || !data || data.length === 0) {
    document.getElementById('badge-total').textContent = '0 registros';
    document.getElementById('tabla-fichajes').innerHTML = '<div class="vacio">No hay fichajes para estos filtros</div>';
    return;
  }

  document.getElementById('badge-total').textContent = data.length + ' registros';

  document.getElementById('tabla-fichajes').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Trabajador</th>
          <th>DNI</th>
          <th>Obra</th>
          <th>Tipo</th>
          <th>Hora</th>
          <th>Avisos</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(f => {
          const avisos = [];
          if (f.cierre_automatico) avisos.push('⏰ Autocierre');
          if (f.es_tarde) avisos.push('🕐 Tarde');
          if (f.fuera_de_zona) avisos.push('📍 Fuera de zona');
          if (f.es_manual) avisos.push('✍️ Manual');
          if (f.corregido_por) avisos.push('🛠️ Corregido');

          return `
            <tr>
              <td><strong>${esc(f.trabajador?.nombre)} ${esc(f.trabajador?.apellidos)}</strong></td>
              <td>${esc(f.trabajador?.dni)}</td>
              <td>${esc(f.obra?.nombre)}</td>
              <td><span class="pill ${f.tipo === 'entrada' ? 'verde' : 'azul'}">${esc(f.tipo)}</span></td>
              <td>${formatFechaHora(f.hora)}</td>
              <td>${avisos.length ? avisos.join(' ') : '—'}</td>
            </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

async function exportarExcelMensual() {
  const msg = document.getElementById('msg-export');
  const btn = document.getElementById('btn-exportar');

  msg.className = 'msg-export';
  msg.textContent = '';

  const obraId = document.getElementById('filtro-obra').value;
  const mes = document.getElementById('filtro-mes').value;

  if (!obraId) {
    msg.className = 'msg-export err';
    msg.textContent = 'Selecciona una obra para exportar.';
    return;
  }

  if (!mes) {
    msg.className = 'msg-export err';
    msg.textContent = 'Selecciona un mes.';
    return;
  }

  if (!window.ExcelJS) {
    msg.className = 'msg-export err';
    msg.textContent = 'No se ha cargado ExcelJS. Recarga la página.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Exportando…';
  msg.textContent = 'Preparando Excel…';

  try {
    const obra = await obtenerObra(obraId);
    const datos = await obtenerFichajesMes(obraId, mes);

    if (!datos || datos.length === 0) {
      msg.className = 'msg-export err';
      msg.textContent = 'No hay fichajes en ese mes para esa obra.';
      btn.disabled = false;
      btn.textContent = 'Exportar Excel';
      return;
    }

    const grupos = agruparPorEmpresa(datos);
    const workbook = new ExcelJS.Workbook();
    workbook.creator = 'Fichaje Obras';
    workbook.created = new Date();

    const [year, month] = mes.split('-').map(Number);
    const diasMes = new Date(year, month, 0).getDate();

    Object.keys(grupos).sort((a, b) => a.localeCompare(b, 'es')).forEach(nombreEmpresa => {
      const trabajadores = construirResumenTrabajadores(grupos[nombreEmpresa], diasMes);
      crearHojaEmpresa(workbook, {
        obra,
        nombreEmpresa,
        mes,
        year,
        month,
        diasMes,
        trabajadores
      });
    });

    const buffer = await workbook.xlsx.writeBuffer();
    const nombreArchivo = `control_personal_${limpiarNombreArchivo(obra?.nombre || 'obra')}_${mes}.xlsx`;
    descargarBuffer(buffer, nombreArchivo);

    msg.className = 'msg-export ok';
    msg.textContent = 'Excel generado.';
  } catch (err) {
    console.error(err);
    msg.className = 'msg-export err';
    msg.textContent = 'Error al exportar: ' + (err.message || err);
  }

  btn.disabled = false;
  btn.textContent = 'Exportar Excel';
}

async function obtenerObra(obraId) {
  const { data, error } = await sb
    .from('obras')
    .select('id, nombre')
    .eq('id', obraId)
    .single();

  if (error) throw error;
  return data;
}

async function obtenerFichajesMes(obraId, mes) {
  // I1: rango del mes en hora local española (Europe/Madrid).
  // El primer día del mes a las 00:00 local y el primer día del mes siguiente a las 00:00 local,
  // luego se convierten a UTC ISO para enviar a Supabase.
  const [year, month] = mes.split('-').map(Number);
  const desde = new Date(year, month - 1, 1, 0, 0, 0, 0);
  const hasta = new Date(year, month, 1, 0, 0, 0, 0);
  const inicio = desde.toISOString();
  const fin = hasta.toISOString();

  let { data, error } = await sb
    .from('fichajes')
    .select(`
      id,
      tipo,
      hora,
      trabajador_id,
      trabajador:trabajador_id(
        id,
        nombre,
        apellidos,
        dni,
        categoria,
        precio_hora_personalizado,
        empresa:empresa_id(nombre)
      )
    `)
    .eq('obra_id', obraId)
    .gte('hora', inicio)
    .lt('hora', fin)
    .order('hora', { ascending: true });

  if (!error) return data || [];

  const fallback = await sb
    .from('fichajes')
    .select(`
      id,
      tipo,
      hora,
      trabajador_id,
      trabajador:trabajador_id(
        id,
        nombre,
        apellidos,
        dni,
        categoria,
        precio_hora_personalizado
      )
    `)
    .eq('obra_id', obraId)
    .gte('hora', inicio)
    .lt('hora', fin)
    .order('hora', { ascending: true });

  if (fallback.error) throw fallback.error;
  return fallback.data || [];
}

function agruparPorEmpresa(fichajes) {
  const grupos = {};

  fichajes.forEach(f => {
    const empresa = f.trabajador?.empresa?.nombre || 'Sin empresa';
    if (!grupos[empresa]) grupos[empresa] = [];
    grupos[empresa].push(f);
  });

  return grupos;
}

function construirResumenTrabajadores(fichajes, diasMes) {
  const mapa = new Map();

  fichajes.forEach(f => {
    const t = f.trabajador;
    if (!t) return;

    if (!mapa.has(t.id)) {
      mapa.set(t.id, {
        id: t.id,
        nombre: nombreCompleto(t),
        dni: t.dni || '',
        categoria: t.categoria || '',
        precio_hora: t.precio_hora_personalizado ?? null,
        fichajes: []
      });
    }

    mapa.get(t.id).fichajes.push(f);
  });

  const trabajadores = [...mapa.values()].sort((a, b) => a.nombre.localeCompare(b.nombre, 'es'));

  trabajadores.forEach(t => {
    t.dias = {};
    for (let d = 1; d <= diasMes; d++) t.dias[d] = 0;

    const porDia = {};

    t.fichajes.forEach(f => {
      // I1: Date(iso) interpreta el ISO como UTC y getDate() devuelve el día
      // en zona local del navegador (España) -> correcto para asignar al calendario.
      const d = new Date(f.hora);
      const dia = d.getDate();
      if (!porDia[dia]) porDia[dia] = [];
      porDia[dia].push({ tipo: f.tipo, hora: d });
    });

    Object.keys(porDia).forEach(diaStr => {
      const dia = Number(diaStr);
      const eventos = porDia[dia].sort((a, b) => a.hora - b.hora);
      let entrada = null;
      let horas = 0;

      eventos.forEach(ev => {
        if (ev.tipo === 'entrada') {
          if (!entrada) entrada = ev.hora;
        } else if (ev.tipo === 'salida') {
          if (entrada) {
            const diff = (ev.hora - entrada) / 3600000;
            if (diff > 0 && diff < 24) horas += diff;
            entrada = null;
          }
        }
      });

      t.dias[dia] = redondear2(horas);
    });

    t.horas_mes = redondear2(Object.values(t.dias).reduce((a, b) => a + b, 0));
    t.total = t.precio_hora ? redondear2(t.horas_mes * Number(t.precio_hora)) : 0;
  });

  return trabajadores;
}

function crearHojaEmpresa(workbook, { obra, nombreEmpresa, mes, year, month, diasMes, trabajadores }) {
  const sheetName = nombreHojaSeguro(nombreEmpresa);
  const ws = workbook.addWorksheet(sheetName, {
    pageSetup: {
      paperSize: 9,
      orientation: 'landscape',
      fitToPage: true,
      fitToWidth: 1,
      fitToHeight: 0,
      margins: { left: 0.3, right: 0.3, top: 0.4, bottom: 0.4, header: 0.2, footer: 0.2 }
    }
  });

  const totalCols = 9 + diasMes + 3;
  const colHoras = 10 + diasMes;
  const colPrecio = 11 + diasMes;
  const colTotal = 12 + diasMes;

  ws.columns = construirColumnas(diasMes);

  ws.mergeCells(1, 1, 1, totalCols);
  const title = ws.getCell(1, 1);
  title.value = 'CONTROL DE PERSONAL DE OBRA';
  title.font = { bold: true, size: 16 };
  title.alignment = { horizontal: 'center', vertical: 'middle' };
  title.fill = fill('D9EAD3');
  title.border = borderMedium();

  ws.getRow(1).height = 26;

  ws.getCell(3, 1).value = 'Nº OBRA';
  ws.getCell(3, 2).value = '';
  ws.getCell(3, 3).value = 'DENOMINACIÓN';
  ws.mergeCells(3, 4, 3, 6);
  ws.getCell(3, 4).value = obra?.nombre || '';
  ws.getCell(3, 7).value = 'EMPRESA';
  ws.mergeCells(3, 8, 3, 11);
  ws.getCell(3, 8).value = nombreEmpresa;
  ws.getCell(3, 12).value = 'MES';
  ws.mergeCells(3, 13, 3, Math.min(totalCols, 16));
  ws.getCell(3, 13).value = nombreMes(mes);

  for (let c = 1; c <= totalCols; c++) {
    const cell = ws.getCell(3, c);
    cell.border = borderThin();
    cell.alignment = { horizontal: 'center', vertical: 'middle' };
    if ([1,3,7,12].includes(c)) {
      cell.font = { bold: true };
      cell.fill = fill('E2F0D9');
    }
  }

  const header1 = ws.getRow(5);
  const fixedHeaders = ['NOMBRE', 'DNI', 'CATEGORÍA', 'FORM.', 'EPIS', 'USO MAQ.', 'FIRMA (*)', 'TC2 MES ANT.', 'ALTA S.S. MES ACTUAL'];

  fixedHeaders.forEach((h, i) => {
    header1.getCell(i + 1).value = h;
  });

  for (let d = 1; d <= diasMes; d++) {
    header1.getCell(9 + d).value = letraDiaSemana(year, month, d);
  }

  header1.getCell(colHoras).value = 'HORAS MES';
  header1.getCell(colPrecio).value = 'PRECIO HORA';
  header1.getCell(colTotal).value = '€';

  const header2 = ws.getRow(6);
  for (let d = 1; d <= diasMes; d++) {
    header2.getCell(9 + d).value = d;
  }

  [5, 6].forEach(r => {
    const row = ws.getRow(r);
    row.height = r === 5 ? 34 : 20;
    for (let c = 1; c <= totalCols; c++) {
      const cell = row.getCell(c);
      cell.font = { bold: true, size: 9 };
      cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
      cell.fill = fill('D9EAD3');
      cell.border = borderThin();
    }
  });

  let rowIndex = 7;

  if (trabajadores.length === 0) {
    const row = ws.getRow(rowIndex);
    row.getCell(1).value = 'Sin trabajadores con fichajes en este mes';
    rowIndex++;
  } else {
    trabajadores.forEach(t => {
      const row = ws.getRow(rowIndex);
      row.height = 24;

      row.getCell(1).value = t.nombre;
      row.getCell(2).value = t.dni;
      row.getCell(3).value = t.categoria || '';
      row.getCell(4).value = '';
      row.getCell(5).value = '';
      row.getCell(6).value = '';
      row.getCell(7).value = '';
      row.getCell(8).value = '';
      row.getCell(9).value = '';

      for (let d = 1; d <= diasMes; d++) {
        const v = t.dias[d] || '';
        row.getCell(9 + d).value = v;
        row.getCell(9 + d).numFmt = '0.00';
      }

      row.getCell(colHoras).value = t.horas_mes || '';
      row.getCell(colHoras).numFmt = '0.00';

      row.getCell(colPrecio).value = t.precio_hora !== null && t.precio_hora !== undefined ? Number(t.precio_hora) : '';
      row.getCell(colPrecio).numFmt = '#,##0.00 €';

      row.getCell(colTotal).value = t.total || '';
      row.getCell(colTotal).numFmt = '#,##0.00 €';

      for (let c = 1; c <= totalCols; c++) {
        const cell = row.getCell(c);
        cell.border = borderThin();
        cell.alignment = { horizontal: c <= 3 ? 'left' : 'center', vertical: 'middle', wrapText: true };
        if (c === colHoras || c === colPrecio || c === colTotal) {
          cell.fill = fill('FFF2CC');
          cell.font = { bold: true };
        }
      }

      rowIndex++;
    });
  }

  rowIndex += 1;

  ws.mergeCells(rowIndex, 1, rowIndex + 2, totalCols);
  const legal = ws.getCell(rowIndex, 1);
  legal.value = textoLegal();
  legal.alignment = { horizontal: 'left', vertical: 'middle', wrapText: true };
  legal.font = { size: 9 };
  legal.border = borderThin();
  rowIndex += 4;

  ws.mergeCells(rowIndex, 1, rowIndex, 6);
  ws.mergeCells(rowIndex, 8, rowIndex, 14);
  ws.getCell(rowIndex, 1).value = 'CONFORME ENCARGADO';
  ws.getCell(rowIndex, 8).value = 'EMPRESA SUBCONTRATISTA';

  [ws.getCell(rowIndex, 1), ws.getCell(rowIndex, 8)].forEach(cell => {
    cell.font = { bold: true };
    cell.alignment = { horizontal: 'center' };
    cell.fill = fill('D9EAD3');
    cell.border = borderThin();
  });

  rowIndex += 4;

  ws.mergeCells(rowIndex, 1, rowIndex, 6);
  ws.mergeCells(rowIndex, 8, rowIndex, 14);
  ws.getCell(rowIndex, 1).value = 'Fdo.:';
  ws.getCell(rowIndex, 8).value = 'Fdo.:';

  [ws.getCell(rowIndex, 1), ws.getCell(rowIndex, 8)].forEach(cell => {
    cell.border = {
      top: { style: 'thin', color: { argb: '000000' } }
    };
  });

  rowIndex += 2;
  ws.mergeCells(rowIndex, 1, rowIndex, totalCols);
  ws.getCell(rowIndex, 1).value = '(*) La firma del trabajador acredita su presencia en obra durante la jornada indicada.';
  ws.getCell(rowIndex, 1).font = { size: 8, italic: true };
  ws.getCell(rowIndex, 1).alignment = { wrapText: true };

  ws.views = [{ state: 'frozen', xSplit: 9, ySplit: 6 }];

  for (let r = 1; r <= rowIndex; r++) {
    ws.getRow(r).commit();
  }
}

function construirColumnas(diasMes) {
  const cols = [
    { width: 30 },
    { width: 13 },
    { width: 14 },
    { width: 7 },
    { width: 7 },
    { width: 9 },
    { width: 13 },
    { width: 12 },
    { width: 16 }
  ];

  for (let d = 1; d <= diasMes; d++) cols.push({ width: 4 });

  cols.push({ width: 11 });
  cols.push({ width: 12 });
  cols.push({ width: 11 });

  return cols;
}

function textoLegal() {
  return 'El trabajador firmante declara haber recibido la información/formación preventiva necesaria, disponer de los EPIs requeridos y encontrarse autorizado para el acceso a obra conforme a la documentación aportada por su empresa.';
}

function fill(color) {
  return {
    type: 'pattern',
    pattern: 'solid',
    fgColor: { argb: color }
  };
}

function borderThin() {
  return {
    top: { style: 'thin', color: { argb: '000000' } },
    left: { style: 'thin', color: { argb: '000000' } },
    bottom: { style: 'thin', color: { argb: '000000' } },
    right: { style: 'thin', color: { argb: '000000' } }
  };
}

function borderMedium() {
  return {
    top: { style: 'medium', color: { argb: '000000' } },
    left: { style: 'medium', color: { argb: '000000' } },
    bottom: { style: 'medium', color: { argb: '000000' } },
    right: { style: 'medium', color: { argb: '000000' } }
  };
}

function descargarBuffer(buffer, filename) {
  const blob = new Blob([buffer], {
    type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
  });

  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();

  setTimeout(() => window.URL.revokeObjectURL(url), 1000);
}

function nombreCompleto(t) {
  return [t.nombre, t.apellidos].filter(Boolean).join(' ').trim() || '(sin nombre)';
}

function nombreHojaSeguro(nombre) {
  return String(nombre || 'Sin empresa')
    .replace(/[\\/?*\[\]:]/g, ' ')
    .substring(0, 31)
    .trim() || 'Sin empresa';
}

function limpiarNombreArchivo(txt) {
  return String(txt || 'archivo')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function letraDiaSemana(year, month, day) {
  const d = new Date(year, month - 1, day);
  const letras = ['D', 'L', 'M', 'X', 'J', 'V', 'S'];
  return letras[d.getDay()];
}

function nombreMes(mes) {
  const [year, month] = mes.split('-').map(Number);
  const d = new Date(year, month - 1, 1);
  return d.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' }).toUpperCase();
}

function redondear2(n) {
  return Math.round((Number(n) || 0) * 100) / 100;
}

function fechaHoy() {
  return new Date().toISOString().split('T')[0];
}

function mesActual() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function esc(txt) {
  const d = document.createElement('div');
  d.textContent = String(txt || '');
  return d.innerHTML;
}

function formatFechaHora(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' }) + ' ' +
         d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

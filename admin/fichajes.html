<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fichajes — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>

<style>
  :root {
    --verde: #4caf50; --naranja: #ff9800; --rojo: #f44336; --azul: #2196f3;
    --bg: #111318; --bg2: #1a1d24; --bg3: #22262f; --borde: #2e3340;
    --texto: #e8eaf0; --texto2: #8b909e; --sidebar-w: 200px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--texto); min-height: 100vh; display: flex; }
  .sidebar { width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--borde); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; }
  .sidebar-brand { padding: 18px 16px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; justify-content: center; gap: 14px; }
  .sidebar-brand img { height: 22px; width: auto; opacity: 0.9; }
  .sidebar-section { padding: 18px 14px 6px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--texto2); }
  .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 14px; color: var(--texto2); text-decoration: none; border-radius: 8px; margin: 2px 8px; transition: background 0.15s, color 0.15s; }
  .sidebar a:hover { background: var(--bg3); color: var(--texto); }
  .sidebar a.activo { background: var(--bg3); color: var(--texto); font-weight: 600; }
  .sidebar a .ico { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-bottom { margin-top: auto; padding: 16px; border-top: 1px solid var(--borde); }
  .btn-salir { width: 100%; background: transparent; border: 1px solid var(--borde); color: var(--texto2); padding: 9px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; text-align: left; display: flex; align-items: center; gap: 8px; }
  .btn-salir:hover { background: var(--bg3); color: var(--texto); }
  .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
  .topbar { padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 22px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
  .contenido { padding: 0 28px 28px; }
  .barra-filtros { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .barra-filtros input, .barra-filtros select {
    background: var(--bg2); border: 1px solid var(--borde); border-radius: 8px;
    color: var(--texto); font-size: 14px; padding: 9px 14px; font-family: inherit;
  }
  .barra-filtros input[type="date"] { width: 160px; color-scheme: dark; }
  .barra-filtros input[type="month"] { width: 160px; color-scheme: dark; }
  .barra-filtros select { width: 230px; }
  .barra-filtros input:focus, .barra-filtros select:focus { outline: none; border-color: var(--azul); }
  .btn-secundario { background: transparent; color: var(--texto2); border: 1px solid var(--borde); padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-secundario:hover { background: var(--bg3); color: var(--texto); }
  .btn-exportar { background: var(--verde); color: white; border: none; padding: 9px 15px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-exportar:hover { opacity: 0.9; }
  .btn-exportar:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg-export { font-size: 12px; color: var(--texto2); }
  .msg-export.err { color: var(--rojo); }
  .msg-export.ok { color: var(--verde); }
  .seccion { background: var(--bg2); border: 1px solid var(--borde); border-radius: 10px; overflow: hidden; }
  .seccion-cab { padding: 14px 20px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; justify-content: space-between; }
  .seccion-cab h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: rgba(33,150,243,0.15); color: var(--azul); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 11px 20px; font-size: 11px; font-weight: 700; color: var(--texto2); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--borde); }
  td { padding: 13px 20px; border-bottom: 1px solid var(--borde); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .pill.verde  { background: rgba(76,175,80,0.15);  color: var(--verde); }
  .pill.azul   { background: rgba(33,150,243,0.15); color: var(--azul); }
  .vacio { padding: 40px 20px; text-align: center; color: var(--texto2); font-size: 14px; }
  .cargando { padding: 40px 20px; text-align: center; color: var(--texto2); }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <img src="../assets/logos/bosch_pascual_logo_white.svg" alt="Bosch Pascual">
    <img src="../assets/logos/recop_logo_white.svg" alt="Rècop">
  </div>

  <div class="sidebar-section">Principal</div>
  <a href="index.html"><span class="ico">📊</span> Dashboard</a>

  <div class="sidebar-section">Gestión</div>
  <a href="obras.html"><span class="ico">🏗</span> Obras</a>
  <a href="trabajadores.html"><span class="ico">👷</span> Trabajadores</a>
  <a href="#"><span class="ico">🏢</span> Empresas</a>
  <a href="fichajes.html" class="activo"><span class="ico">📋</span> Fichajes</a>
  <a href="incidencias.html"><span class="ico">⚠️</span> Incidencias</a>
  <a href="reglas.html"><span class="ico">📋</span> Reglas documentales</a>

  <div class="sidebar-bottom">
    <button class="btn-salir" id="btn-salir">↩ Cerrar sesión</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1>Fichajes</h1>
  </div>

  <div class="contenido">
    <div class="barra-filtros">
      <input type="date" id="filtro-fecha">

      <select id="filtro-obra">
        <option value="">Todas las obras</option>
      </select>

      <button class="btn-secundario" id="btn-buscar">Buscar</button>
      <button class="btn-secundario" id="btn-hoy">Hoy</button>

      <input type="month" id="filtro-mes">
      <button class="btn-exportar" id="btn-exportar">Exportar Excel</button>
      <span class="msg-export" id="msg-export"></span>
    </div>

    <div class="seccion">
      <div class="seccion-cab">
        <h2>Historial de fichajes</h2>
        <span class="badge" id="badge-total">—</span>
      </div>
      <div id="tabla-fichajes"><div class="cargando">Cargando…</div></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://istrnsicleopzbsrapsw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzdHJuc2ljbGVvcHpic3JhcHN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTIxMTYsImV4cCI6MjA5MTM4ODExNn0.5UXV2LWPXmbfLI7rKpZSG9YBzZsesjckHnhQabA0mTY';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

(async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '../'; return; }

  const { data: u } = await sb.from('usuarios_app')
    .select('rol')
    .eq('auth_user_id', session.user.id)
    .single();

  if (!u || u.rol !== 'admin') { window.location.href = '../'; return; }

  document.getElementById('filtro-fecha').value = fechaHoy();
  document.getElementById('filtro-mes').value = mesActual();

  await cargarObras();
  await buscar();
})();

document.getElementById('btn-salir').onclick = async () => {
  await sb.auth.signOut();
  window.location.href = '../';
};

async function cargarObras() {
  const { data } = await sb
    .from('obras')
    .select('id, nombre')
    .eq('activa', true)
    .order('nombre');

  const select = document.getElementById('filtro-obra');

  (data || []).forEach(o => {
    const opt = document.createElement('option');
    opt.value = o.id;
    opt.textContent = o.nombre;
    select.appendChild(opt);
  });
}

document.getElementById('btn-buscar').onclick = buscar;
document.getElementById('btn-hoy').onclick = () => {
  document.getElementById('filtro-fecha').value = fechaHoy();
  buscar();
};
document.getElementById('btn-exportar').onclick = exportarExcelMensual;

async function buscar() {
  document.getElementById('tabla-fichajes').innerHTML = '<div class="cargando">Cargando…</div>';

  const fecha  = document.getElementById('filtro-fecha').value;
  const obraId = document.getElementById('filtro-obra').value;

  let query = sb
    .from('fichajes')
    .select('id, tipo, hora, cierre_automatico, es_tarde, fuera_de_zona, es_manual, origen, corregido_por, trabajador:trabajador_id(nombre, apellidos, dni), obra:obra_id(nombre)')
    .order('hora', { ascending: false })
    .limit(200);

  if (fecha) {
    // I1: rango del día en hora local del navegador, enviado como UTC ISO
    const [y, m, d] = fecha.split('-').map(Number);
    const desde = new Date(y, m - 1, d, 0, 0, 0, 0);
    const hasta = new Date(y, m - 1, d, 23, 59, 59, 999);
    query = query.gte('hora', desde.toISOString()).lte('hora', hasta.toISOString());
  }

  if (obraId) {
    query = query.eq('obra_id', obraId);
  }

  const { data, error } = await query;

  if (error || !data || data.length === 0) {
    document.getElementById('badge-total').textContent = '0 registros';
    document.getElementById('tabla-fichajes').innerHTML = '<div class="vacio">No hay fichajes para estos filtros</div>';
    return;
  }

  document.getElementById('badge-total').textContent = data.length + ' registros';

  document.getElementById('tabla-fichajes').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Trabajador</th>
          <th>DNI</th>
          <th>Obra</th>
          <th>Tipo</th>
          <th>Hora</th>
          <th>Avisos</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(f => {
          const avisos = [];
          if (f.cierre_automatico) avisos.push('⏰ Autocierre');
          if (f.es_tarde) avisos.push('🕐 Tarde');
          if (f.fuera_de_zona) avisos.push('📍 Fuera de zona');
          if (f.es_manual) avisos.push('✍️ Manual');
          if (f.corregido_por) avisos.push('🛠️ Corregido');

          return `
            <tr>
              <td><strong>${esc(f.trabajador?.nombre)} ${esc(f.trabajador?.apellidos)}</strong></td>
              <td>${esc(f.trabajador?.dni)}</td>
              <td>${esc(f.obra?.nombre)}</td>
              <td><span class="pill ${f.tipo === 'entrada' ? 'verde' : 'azul'}">${esc(f.tipo)}</span></td>
              <td>${formatFechaHora(f.hora)}</td>
              <td>${avisos.length ? avisos.join(' ') : '—'}</td>
            </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

// =====================================================================
// EXPORTACIÓN EXCEL MENSUAL
// =====================================================================
// El generador del Excel vive en js/excel-proforma.js (window.ExcelProforma).
// Aquí solo:
//   1) validamos formulario,
//   2) consultamos los datos a Supabase con permisos de admin,
//   3) llamamos al módulo,
//   4) descargamos el archivo.
// =====================================================================

async function exportarExcelMensual() {
  const msg = document.getElementById('msg-export');
  const btn = document.getElementById('btn-exportar');

  msg.className = 'msg-export';
  msg.textContent = '';

  const obraId = document.getElementById('filtro-obra').value;
  const mes = document.getElementById('filtro-mes').value;

  if (!obraId) {
    msg.className = 'msg-export err';
    msg.textContent = 'Selecciona una obra para exportar.';
    return;
  }

  if (!mes) {
    msg.className = 'msg-export err';
    msg.textContent = 'Selecciona un mes.';
    return;
  }

  if (!window.ExcelJS) {
    msg.className = 'msg-export err';
    msg.textContent = 'No se ha cargado ExcelJS. Recarga la página.';
    return;
  }

  if (!window.ExcelProforma) {
    msg.className = 'msg-export err';
    msg.textContent = 'No se ha cargado js/excel-proforma.js. Recarga la página.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Exportando…';
  msg.textContent = 'Preparando Excel…';

  try {
    const obra = await obtenerObra(obraId);
    const fichajes = await obtenerFichajesMes(obraId, mes);

    if (!fichajes || fichajes.length === 0) {
      msg.className = 'msg-export err';
      msg.textContent = 'No hay fichajes en ese mes para esa obra.';
      btn.disabled = false;
      btn.textContent = 'Exportar Excel';
      return;
    }

    const buffer = await window.ExcelProforma.generar({ obra, mes, fichajes });
    const nombreArchivo = `control_personal_${limpiarNombreArchivo(obra?.nombre || 'obra')}_${mes}.xlsx`;
    descargarBuffer(buffer, nombreArchivo);

    msg.className = 'msg-export ok';
    msg.textContent = 'Excel generado.';
  } catch (err) {
    console.error(err);
    msg.className = 'msg-export err';
    msg.textContent = 'Error al exportar: ' + (err.message || err);
  }

  btn.disabled = false;
  btn.textContent = 'Exportar Excel';
}

async function obtenerObra(obraId) {
  const { data, error } = await sb
    .from('obras')
    .select('id, nombre, numero_obra, empresa_marca')
    .eq('id', obraId)
    .single();

  if (error) throw error;
  return data;
}

async function obtenerFichajesMes(obraId, mes) {
  // I1: rango del mes en hora local española (Europe/Madrid).
  // El primer día del mes a las 00:00 local y el primer día del mes siguiente a las 00:00 local,
  // luego se convierten a UTC ISO para enviar a Supabase.
  const [year, month] = mes.split('-').map(Number);
  const desde = new Date(year, month - 1, 1, 0, 0, 0, 0);
  const hasta = new Date(year, month, 1, 0, 0, 0, 0);
  const inicio = desde.toISOString();
  const fin = hasta.toISOString();

  // Intento 1: con join a empresa
  // Frente B: pedimos cierre_automatico para marcar en amarillo en el Excel.
  let { data, error } = await sb
    .from('fichajes')
    .select(`
      id,
      tipo,
      hora,
      cierre_automatico,
      trabajador_id,
      trabajador:trabajador_id(
        id,
        nombre,
        apellidos,
        dni,
        categoria,
        precio_hora_personalizado,
        empresa:empresa_id(nombre)
      )
    `)
    .eq('obra_id', obraId)
    .gte('hora', inicio)
    .lt('hora', fin)
    .order('hora', { ascending: true });

  if (!error) return data || [];

  // Fallback: sin empresa (por si el FK no existe en algún entorno)
  const fallback = await sb
    .from('fichajes')
    .select(`
      id,
      tipo,
      hora,
      cierre_automatico,
      trabajador_id,
      trabajador:trabajador_id(
        id,
        nombre,
        apellidos,
        dni,
        categoria,
        precio_hora_personalizado
      )
    `)
    .eq('obra_id', obraId)
    .gte('hora', inicio)
    .lt('hora', fin)
    .order('hora', { ascending: true });

  if (fallback.error) throw fallback.error;
  return fallback.data || [];
}

// =====================================================================
// Helpers locales (descarga, formato, escape)
// =====================================================================

function descargarBuffer(buffer, filename) {
  const blob = new Blob([buffer], {
    type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
  });

  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();

  setTimeout(() => window.URL.revokeObjectURL(url), 1000);
}

function limpiarNombreArchivo(txt) {
  return String(txt || 'archivo')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function fechaHoy() {
  return new Date().toISOString().split('T')[0];
}

function mesActual() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function esc(txt) {
  const d = document.createElement('div');
  d.textContent = String(txt || '');
  return d.innerHTML;
}

function formatFechaHora(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' }) + ' ' +
         d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}
</script>

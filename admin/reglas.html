<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reglas documentales — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --verde: #4caf50; --naranja: #ff9800; --rojo: #f44336; --azul: #2196f3;
    --bg: #111318; --bg2: #1a1d24; --bg3: #22262f; --borde: #2e3340;
    --texto: #e8eaf0; --texto2: #8b909e; --sidebar-w: 200px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--texto); min-height: 100vh; display: flex; }
  .sidebar { width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--borde); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; }
  .sidebar-brand { padding: 18px 16px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; justify-content: center; gap: 14px; }
  .sidebar-brand img { height: 22px; width: auto; opacity: 0.9; }
  .sidebar-section { padding: 18px 14px 6px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--texto2); }
  .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 14px; color: var(--texto2); text-decoration: none; border-radius: 8px; margin: 2px 8px; transition: background 0.15s, color 0.15s; }
  .sidebar a:hover { background: var(--bg3); color: var(--texto); }
  .sidebar a.activo { background: var(--bg3); color: var(--texto); font-weight: 600; }
  .sidebar a .ico { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-bottom { margin-top: auto; padding: 16px; border-top: 1px solid var(--borde); }
  .btn-salir { width: 100%; background: transparent; border: 1px solid var(--borde); color: var(--texto2); padding: 9px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; text-align: left; display: flex; align-items: center; gap: 8px; }
  .btn-salir:hover { background: var(--bg3); color: var(--texto); }
  .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
  .topbar { padding: 20px 28px 8px; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 22px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
  .subtitulo { padding: 0 28px 18px; color: var(--texto2); font-size: 14px; }
  .contenido { padding: 0 28px 28px; }
  .btn-primario { background: var(--azul); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-primario:hover { opacity: 0.9; }
  .btn-exito { background: var(--verde); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-exito:hover { opacity: 0.9; }
  .btn-secundario { background: transparent; color: var(--texto2); border: 1px solid var(--borde); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; }
  .btn-secundario:hover { background: var(--bg3); color: var(--texto); }
  .btn-peligro-sutil { background: transparent; color: var(--rojo); border: 1px solid rgba(244,67,54,0.35); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; }
  .btn-peligro-sutil:hover { background: rgba(244,67,54,0.1); }

  .toolbar { display: flex; justify-content: flex-end; margin-bottom: 14px; }
  .toolbar-inferior { display: flex; justify-content: flex-end; margin-top: 16px; }

  .mensaje { padding: 11px 16px; border-radius: 8px; margin-bottom: 14px; font-size: 13px; display: none; white-space: pre-line; }
  .mensaje.ok  { background: rgba(76,175,80,0.12);  color: var(--verde); border: 1px solid rgba(76,175,80,0.3); }
  .mensaje.err { background: rgba(244,67,54,0.12);  color: var(--rojo);  border: 1px solid rgba(244,67,54,0.3); }

  .seccion { background: var(--bg2); border: 1px solid var(--borde); border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 11px 16px; font-size: 11px; font-weight: 700; color: var(--texto2); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--borde); }
  td { padding: 10px 16px; border-bottom: 1px solid var(--borde); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }
  tr.nueva td { border-left: 2px solid var(--verde); }
  tr.nueva td:first-child { border-left: 2px solid var(--verde); }

  td input[type="text"], td select {
    width: 100%; background: var(--bg3); border: 1px solid var(--borde); border-radius: 6px;
    color: var(--texto); font-size: 13px; padding: 7px 10px; font-family: inherit;
  }
  td input[type="text"]:focus, td select:focus { outline: none; border-color: var(--azul); }
  td input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--azul); }
  td.celda-check { text-align: center; }

  .vacio { padding: 40px 20px; text-align: center; color: var(--texto2); font-size: 14px; }
  .cargando { padding: 40px 20px; text-align: center; color: var(--texto2); }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <img src="../assets/logos/bosch_pascual_logo_white.svg" alt="Bosch Pascual">
    <img src="../assets/logos/recop_logo_white.svg" alt="Rècop">
  </div>
  <div class="sidebar-section">Principal</div>
  <a href="index.html"><span class="ico">📊</span> Dashboard</a>
  <div class="sidebar-section">Gestión</div>
  <a href="obras.html"><span class="ico">🏗</span> Obras</a>
  <a href="trabajadores.html"><span class="ico">👷</span> Trabajadores</a>
  <a href="#"><span class="ico">🏢</span> Empresas</a>
  <a href="fichajes.html"><span class="ico">📋</span> Fichajes</a>
  <a href="incidencias.html"><span class="ico">⚠️</span> Incidencias</a>
  <a href="reglas.html" class="activo"><span class="ico">📋</span> Reglas documentales</a>
  <div class="sidebar-bottom">
    <button class="btn-salir" id="btn-salir">↩ Cerrar sesión</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1>Reglas documentales</h1>
    <button class="btn-primario" onclick="nuevaFila()">+ Nueva regla</button>
  </div>
  <div class="subtitulo">Define cuándo un documento pone a un trabajador en verde, naranja o rojo.</div>

  <div class="contenido">
    <div id="msgOk" class="mensaje ok"></div>
    <div id="msgErr" class="mensaje err"></div>

    <div class="seccion">
      <table id="tablaReglas">
        <thead>
          <tr>
            <th>Documento</th>
            <th>Estado e-Coordina</th>
            <th style="text-align:center">Obligatorio</th>
            <th>Aplica a</th>
            <th>Resultado</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="cuerpoTabla">
          <tr><td colspan="5"><div class="cargando">Cargando…</div></td></tr>
        </tbody>
      </table>
    </div>

    <div class="toolbar-inferior">
      <button class="btn-exito" onclick="guardarTodo()">💾 Guardar cambios</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://istrnsicleopzbsrapsw.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzdHJuc2ljbGVvcHpic3JhcHN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTIxMTYsImV4cCI6MjA5MTM4ODExNn0.5UXV2LWPXmbfLI7rKpZSG9YBzZsesjckHnhQabA0mTY';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let reglas = []; // datos actuales
  let eliminadas = []; // IDs a borrar

  async function checkAdmin() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { location.href = '../index.html'; return; }
    const { data } = await sb.from('usuarios_app').select('rol').eq('auth_user_id', session.user.id).single();
    if (!data || data.rol !== 'admin') { location.href = '../index.html'; }
  }

  async function cargarReglas() {
    const { data, error } = await sb.from('reglas_documentales')
      .select('*')
      .order('nombre_documento')
      .order('estado_ecoordina');

    if (error) { mostrarError('Error al cargar reglas: ' + error.message); return; }
    reglas = data || [];
    renderTabla();
  }

  function renderTabla() {
    const tbody = document.getElementById('cuerpoTabla');
    if (reglas.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="vacio">No hay reglas. Añade la primera.</div></td></tr>';
      return;
    }
    tbody.innerHTML = reglas.map((r, i) => `
      <tr data-i="${i}" ${r._nueva ? 'class="nueva"' : ''}>
        <td><input type="text" value="${esc(r.nombre_documento)}" onchange="actualizar(${i},'nombre_documento',this.value)"/></td>
        <td><input type="text" value="${esc(r.estado_ecoordina)}" onchange="actualizar(${i},'estado_ecoordina',this.value)"/></td>
        <td class="celda-check">
          <input type="checkbox" ${r.es_obligatorio ? 'checked' : ''} onchange="actualizar(${i},'es_obligatorio',this.checked)"/>
        </td>
        <td>
          <select onchange="actualizar(${i},'aplica_a',this.value)">
            <option value="trabajador" ${r.aplica_a==='trabajador' ?'selected':''}>👷 Trabajador</option>
            <option value="empresa"    ${r.aplica_a==='empresa'    ?'selected':''}>🏢 Empresa</option>
          </select>
        </td>
        <td>
          <select onchange="actualizar(${i},'resultado',this.value)">
            <option value="verde"   ${r.resultado==='verde'   ?'selected':''}>🟢 Verde</option>
            <option value="naranja" ${r.resultado==='naranja' ?'selected':''}>🟠 Naranja</option>
            <option value="rojo"    ${r.resultado==='rojo'    ?'selected':''}>🔴 Rojo</option>
          </select>
        </td>
        <td>
          <button class="btn-peligro-sutil" onclick="eliminarFila(${i})">Eliminar</button>
        </td>
      </tr>
    `).join('');
  }

  function esc(str) {
    return (str || '').replace(/"/g, '&quot;');
  }

  function actualizar(i, campo, valor) {
    reglas[i][campo] = valor;
    if (!reglas[i]._nueva) reglas[i]._modificada = true;
  }

  function nuevaFila() {
    reglas.push({
      id: null,
      nombre_documento: '',
      estado_ecoordina: '',
      es_obligatorio: true,
      aplica_a: 'trabajador',
      resultado: 'rojo',
      _nueva: true
    });
    renderTabla();
    // foco en el primer input de la nueva fila
    const filas = document.querySelectorAll('#cuerpoTabla tr');
    const ultima = filas[filas.length - 1];
    if (ultima) ultima.querySelector('input[type="text"]').focus();
  }

  function eliminarFila(i) {
    const r = reglas[i];
    if (r.id) eliminadas.push(r.id); // marcar para borrar en BD
    reglas.splice(i, 1);
    renderTabla();
  }

  async function guardarTodo() {
    ocultarMensajes();

    // Validar que no haya campos vacíos
    for (const r of reglas) {
      if (!r.nombre_documento.trim() || !r.estado_ecoordina.trim()) {
        mostrarError('Hay filas con Documento o Estado vacío. Rellénalo antes de guardar.');
        return;
      }
    }

    let errores = [];

    // 1. Borrar eliminadas
    for (const id of eliminadas) {
      const { error } = await sb.from('reglas_documentales').delete().eq('id', id);
      if (error) errores.push('Borrar ' + id + ': ' + error.message);
    }

    // 2. Insertar nuevas
    const nuevas = reglas.filter(r => r._nueva);
    for (const r of nuevas) {
      const { error } = await sb.from('reglas_documentales').insert({
        nombre_documento: r.nombre_documento.trim(),
        estado_ecoordina: r.estado_ecoordina.trim(),
        es_obligatorio: r.es_obligatorio,
        aplica_a: r.aplica_a || 'trabajador',
        resultado: r.resultado
      });
      if (error) errores.push('Insertar ' + r.nombre_documento + ': ' + error.message);
    }

    // 3. Actualizar modificadas
    const modificadas = reglas.filter(r => r._modificada && !r._nueva);
    for (const r of modificadas) {
      const { error } = await sb.from('reglas_documentales').update({
        nombre_documento: r.nombre_documento.trim(),
        estado_ecoordina: r.estado_ecoordina.trim(),
        es_obligatorio: r.es_obligatorio,
        aplica_a: r.aplica_a || 'trabajador',
        resultado: r.resultado
      }).eq('id', r.id);
      if (error) errores.push('Actualizar ' + r.nombre_documento + ': ' + error.message);
    }

    if (errores.length > 0) {
      mostrarError('Errores al guardar:\n' + errores.join('\n'));
    } else {
      mostrarOk('Cambios guardados correctamente.');
      eliminadas = [];
      await cargarReglas(); // recargar desde BD
    }
  }

  function mostrarOk(msg) {
    const el = document.getElementById('msgOk');
    el.textContent = msg; el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
  }
  function mostrarError(msg) {
    const el = document.getElementById('msgErr');
    el.textContent = msg; el.style.display = 'block';
  }
  function ocultarMensajes() {
    document.getElementById('msgOk').style.display = 'none';
    document.getElementById('msgErr').style.display = 'none';
  }

  document.getElementById('btn-salir').addEventListener('click', async (e) => {
    e.preventDefault();
    await sb.auth.signOut();
    location.href = '../index.html';
  });

  (async () => {
    await checkAdmin();
    await cargarReglas();
  })();
</script>
</body>
</html>

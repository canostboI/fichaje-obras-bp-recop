<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trabajadores — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --verde: #4caf50; --naranja: #ff9800; --rojo: #f44336; --azul: #2196f3;
    --bg: #111318; --bg2: #1a1d24; --bg3: #22262f; --borde: #2e3340;
    --texto: #e8eaf0; --texto2: #8b909e; --sidebar-w: 200px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--texto); min-height: 100vh; display: flex; }
  .sidebar { width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--borde); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; }
  .sidebar-brand { padding: 18px 16px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; justify-content: center; gap: 14px; }
  .sidebar-brand img { height: 22px; opacity: 0.9; }
  .sidebar-section { padding: 18px 14px 6px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--texto2); }
  .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 14px; color: var(--texto2); text-decoration: none; border-radius: 8px; margin: 2px 8px; }
  .sidebar a.activo { background: var(--bg3); color: var(--texto); }
  .sidebar-bottom { margin-top: auto; padding: 16px; border-top: 1px solid var(--borde); }
  .btn-salir { width: 100%; border: 1px solid var(--borde); background: transparent; color: var(--texto2); padding: 9px; border-radius: 8px; cursor: pointer; }
  .main { margin-left: var(--sidebar-w); flex: 1; }
  .topbar { padding: 20px 28px; display: flex; justify-content: space-between; }
  .contenido { padding: 0 28px 28px; }
  .barra-filtros { display: flex; gap: 12px; margin-bottom: 16px; }
  .barra-filtros input, .barra-filtros select {
    background: var(--bg2); border: 1px solid var(--borde);
    border-radius: 8px; color: var(--texto); padding: 9px;
  }
  .seccion { background: var(--bg2); border: 1px solid var(--borde); border-radius: 10px; }
  table { width: 100%; border-collapse: collapse; }
  td, th { padding: 12px; border-bottom: 1px solid var(--borde); }
  .pill { padding: 3px 10px; border-radius: 20px; font-size: 12px; }
  .pill.verde { background: rgba(76,175,80,0.15); color: var(--verde); }
  .pill.naranja { background: rgba(255,152,0,0.15); color: var(--naranja); }
  .pill.rojo { background: rgba(244,67,54,0.15); color: var(--rojo); }
  .pill.gris { background: rgba(139,144,158,0.15); color: var(--texto2); }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); justify-content:center; align-items:center;}
  .modal-overlay.visible { display:flex; }
  .modal { background:var(--bg2); padding:20px; border-radius:10px; width:400px; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <img src="../assets/logos/bosch_pascual_logo_white.svg">
    <img src="../assets/logos/recop_logo_white.svg">
  </div>
  <a href="trabajadores.html" class="activo">Trabajadores</a>
  <div class="sidebar-bottom">
    <button id="btn-salir" class="btn-salir">Cerrar sesión</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1>Trabajadores</h1>
    <button onclick="nuevo()">+ Nuevo</button>
  </div>

  <div class="contenido">
    <div class="barra-filtros">
      <input id="filtro" placeholder="Buscar">
    </div>
    <div class="seccion">
      <div id="tabla"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="titulo">Nuevo</h3>
    <input id="nombre" placeholder="Nombre"><br><br>
    <input id="dni" placeholder="DNI"><br><br>
    <button onclick="guardar()">Guardar</button>
    <button onclick="cerrar()">Cancelar</button>
  </div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://istrnsicleopzbsrapsw.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
);

let lista = [];
let editando = null;

async function cargar(){
  const {data} = await sb.from('trabajadores').select('*');
  lista = data || [];
  pintar(lista);
}

function pintar(arr){
  document.getElementById('tabla').innerHTML = `
    <table>
      ${arr.map(t=>`
        <tr>
          <td>${t.nombre}</td>
          <td>${t.dni}</td>
          <td><button onclick="abrirEditarPorId('${t.id}')">Editar</button></td>
        </tr>
      `).join('')}
    </table>
  `;
}

function abrirEditarPorId(id){
  const t = lista.find(x=>x.id===id);
  if(!t) return;

  editando = id;
  document.getElementById('nombre').value = t.nombre;
  document.getElementById('dni').value = t.dni;
  document.getElementById('modal').classList.add('visible');
}

function nuevo(){
  editando=null;
  document.getElementById('nombre').value='';
  document.getElementById('dni').value='';
  document.getElementById('modal').classList.add('visible');
}

function cerrar(){
  document.getElementById('modal').classList.remove('visible');
}

async function guardar(){
  const nombre = document.getElementById('nombre').value;
  const dni = document.getElementById('dni').value;

  if(editando){
    await sb.from('trabajadores').update({nombre,dni}).eq('id',editando);
  }else{
    await sb.from('trabajadores').insert({nombre,dni});
  }

  cerrar();
  cargar();
}

cargar();
</script>

</body>
</html>

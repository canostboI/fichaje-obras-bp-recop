<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  :root {
    --verde: #4caf50; --naranja: #ff9800; --rojo: #f44336; --azul: #2196f3;
    --bg: #111318; --bg2: #1a1d24; --bg3: #22262f; --borde: #2e3340;
    --texto: #e8eaf0; --texto2: #8b909e; --sidebar-w: 200px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--texto); min-height: 100vh; display: flex; }
  .sidebar { width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--borde); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; }
  .sidebar-brand { padding: 18px 16px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; justify-content: center; gap: 14px; }
  .sidebar-brand img { height: 22px; width: auto; opacity: 0.9; }
  .sidebar-section { padding: 18px 14px 6px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--texto2); }
  .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 14px; color: var(--texto2); text-decoration: none; border-radius: 8px; margin: 2px 8px; transition: background 0.15s, color 0.15s; }
  .sidebar a:hover { background: var(--bg3); color: var(--texto); }
  .sidebar a.activo { background: var(--bg3); color: var(--texto); font-weight: 600; }
  .sidebar a .ico { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-bottom { margin-top: auto; padding: 16px; border-top: 1px solid var(--borde); }
  .btn-salir { width: 100%; background: transparent; border: 1px solid var(--borde); color: var(--texto2); padding: 9px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; text-align: left; display: flex; align-items: center; gap: 8px; }
  .btn-salir:hover { background: var(--bg3); color: var(--texto); }
  .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
  .topbar { padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 22px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
  .contenido { padding: 0 28px 28px; }
  .btn-primario { background: var(--azul); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-primario:hover { opacity: 0.9; }
  .btn-secundario { background: transparent; color: var(--texto2); border: 1px solid var(--borde); padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-secundario:hover { background: var(--bg3); color: var(--texto); }
  .btn-secundario.peligro { border-color: var(--rojo); color: var(--rojo); }
  .btn-secundario.peligro:hover { background: rgba(244,67,54,0.1); color: var(--rojo); }
  .msg-error { color: var(--rojo); font-size: 13px; }
  .msg-ok { color: var(--verde); font-size: 13px; }
  .barra-filtros { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .barra-filtros input, .barra-filtros select { background: var(--bg2); border: 1px solid var(--borde); border-radius: 8px; color: var(--texto); font-size: 14px; padding: 9px 14px; font-family: inherit; }
  .barra-filtros input { width: 260px; }
  .barra-filtros select { min-width: 200px; cursor: pointer; }
  .barra-filtros input:focus, .barra-filtros select:focus { outline: none; border-color: var(--azul); }
  .seccion { background: var(--bg2); border: 1px solid var(--borde); border-radius: 10px; overflow: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 1050px; }
  th { text-align: left; padding: 11px 20px; font-size: 11px; font-weight: 700; color: var(--texto2); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--borde); }
  td { padding: 13px 20px; border-bottom: 1px solid var(--borde); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }

  /* Grupos empresa */
  tr.grupo-empresa-cab { cursor: pointer; user-select: none; }
  tr.grupo-empresa-cab td { background: var(--bg3); border-bottom: 1px solid var(--borde); border-top: 2px solid var(--borde); padding: 10px 20px; }
  tr.grupo-empresa-cab:first-child td { border-top: none; }
  tr.grupo-empresa-cab:hover td { background: #272b34; }
  .grupo-empresa-label { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: var(--texto); }
  .grupo-empresa-chevron { font-size: 10px; color: var(--texto2); transition: transform 0.18s; display: inline-block; }
  .grupo-empresa-chevron.abierto { transform: rotate(90deg); }
  .grupo-empresa-badges { display: flex; gap: 6px; margin-left: auto; }
  .badge-empresa { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .badge-empresa.rojo    { background: rgba(244,67,54,0.15);  color: var(--rojo); }
  .badge-empresa.naranja { background: rgba(255,152,0,0.15);  color: var(--naranja); }
  .badge-empresa.total   { background: rgba(139,144,158,0.15); color: var(--texto2); }
  tr.grupo-fila.oculto { display: none; }

  .pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin: 2px; white-space: nowrap; }
  .pill.verde  { background: rgba(76,175,80,0.15);  color: var(--verde); }
  .pill.naranja{ background: rgba(255,152,0,0.15);  color: var(--naranja); }
  .pill.rojo   { background: rgba(244,67,54,0.15);  color: var(--rojo); }
  .pill.gris   { background: rgba(139,144,158,0.15); color: var(--texto2); }
  .acciones { display: flex; gap: 8px; }
  .vacio { padding: 40px 20px; text-align: center; color: var(--texto2); font-size: 14px; }
  .cargando { padding: 40px 20px; text-align: center; color: var(--texto2); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.visible { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--borde); border-radius: 14px; padding: 28px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 22px; }
  .campo { margin-bottom: 16px; }
  .campo label { display: block; font-size: 12px; font-weight: 600; color: var(--texto2); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
  .campo input, .campo select { width: 100%; background: var(--bg3); border: 1px solid var(--borde); border-radius: 8px; color: var(--texto); font-size: 14px; padding: 10px 12px; font-family: inherit; }
  .campo input:focus, .campo select:focus { outline: none; border-color: var(--azul); }
  .campo-fila { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-acciones { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .error-modal { background: rgba(244,67,54,0.1); color: var(--rojo); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none; }
  .iconos-hab { display: inline; margin-left: 4px; font-size: 14px; letter-spacing: 1px; }
</style>
  <script src="../js/auto-logout.js"></script>
</head>

    <img src="../assets/logos/bosch_pascual_logo_white.svg" alt="Bosch Pascual">
    <img src="../assets/logos/recop_logo_white.svg" alt="Rècop">

  <div class="sidebar-section">Principal</div>
  <a href="index.html"><span class="ico">📊</span> Dashboard</a>

  <a href="reglas.html"><span class="ico">📋</span> Reglas documentales</a>

</div>

<div class="main">
  <div class="topbar">
    <h1>Trabajadores</h1>

  <div class="contenido">
    <div class="barra-filtros">
      <input type="text" id="filtro" placeholder="Buscar por nombre o DNI…">
      <select id="filtro-empresa">

<script>
const SUPABASE_URL = 'https://istrnsicleopzbsrapsw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzdHJuc2ljbGVvcHpic3JhcHN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTIxMTYsImV4cCI6MjA5MTM4ODExNn0.5UXV2LWPXmbfLI7rKpZSG9YBzZsesjckHnhQabA0mTY';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
AutoLogout.init(sb);

// ── Iconos de habilitación ──────────────────────────────────────────────────
const ICONOS_HAB = [
  { clave: 'movimiento de tierras', icono: '🚜' },
  { clave: 'dumper',                icono: '🚛' },
  { clave: 'grúa torre',            icono: '🏗️' },
  { clave: 'grua torre',            icono: '🏗️' },
  { clave: 'plataforma elevadora',  icono: '🛗' },
  { clave: 'carretilla elevadora',  icono: '🛺' },
  { clave: 'toro',                  icono: '🛺' },
  { clave: 'andamio',               icono: '🪜' },
  { clave: 'altura con arnés',      icono: '🧗' },
  { clave: 'arnes',                 icono: '🧗' },
  { clave: 'eléctrico',             icono: '⚡' },
  { clave: 'electrico',             icono: '⚡' },
  { clave: 'eléctrica',             icono: '⚡' },
];
function iconoHab(nombre) {
  const n = (nombre || '').toLowerCase();
  for (const { clave, icono } of ICONOS_HAB) { if (n.includes(clave)) return icono; }
  return '🔧';
}

let trabajadorEditandoId = null;
let todosTrabajadores = [];
let habIconosPorTrabajador = {};
const gruposAbiertos = {};

(async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '../'; return; }

  const { data: u } = await sb
    .from('usuarios_app')
    .select('rol')
    .eq('auth_user_id', session.user.id)
    .single();

  if (!u || u.rol !== 'admin') { window.location.href = '../'; return; }

  await cargarTrabajadores();
})();

document.getElementById('btn-salir').onclick = async () => {
  await sb.auth.signOut();
  window.location.href = '../';
};

async function cargarTrabajadores() {
  document.getElementById('tabla-trabajadores').innerHTML = '<div class="cargando">Cargando…</div>';

  const { data, error } = await sb
    .from('trabajadores')
    .select(`
      id, nombre, apellidos, dni, telefono, activo, categoria, precio_hora_personalizado,
      empresa:empresa_id(id, nombre),
      validaciones_obra ( estado, obra:obra_id ( id, nombre ) )
    `)
    .order('apellidos');

  if (error || !data) {
    document.getElementById('tabla-trabajadores').innerHTML = '<div class="vacio">Error al cargar trabajadores</div>';
    return;
  }

  todosTrabajadores = data;

  // Cargar habilitaciones activas en paralelo
  const ids = data.map(t => t.id);
  habIconosPorTrabajador = {};
  if (ids.length > 0) {
    const { data: habs } = await sb
      .from('habilitaciones_trabajador')
      .select('trabajador_id, tipo:tipo_habilitacion_id(nombre)')
      .in('trabajador_id', ids)
      .eq('activo', true);

    (habs || []).forEach(h => {
      const icono = iconoHab(h.tipo?.nombre || '');
      if (!habIconosPorTrabajador[h.trabajador_id]) habIconosPorTrabajador[h.trabajador_id] = [];
      if (!habIconosPorTrabajador[h.trabajador_id].includes(icono))
        habIconosPorTrabajador[h.trabajador_id].push(icono);
    });
  }

  rellenarFiltros(data);
  aplicarFiltros();
}

function rellenarFiltros(trabajadores) {
  // Selector empresa
  const empresasMapa = new Map();
  trabajadores.forEach(t => {
    if (t.empresa?.id && !empresasMapa.has(t.empresa.id)) {
      empresasMapa.set(t.empresa.id, t.empresa.nombre);
    }
  });
  const empresas = [...empresasMapa.entries()].sort((a, b) => a[1].localeCompare(b[1], 'es'));
  const selEmpresa = document.getElementById('filtro-empresa');
  const valEmpresa = selEmpresa.value;
  selEmpresa.innerHTML = '<option value="">Todas las empresas</option>' +
    empresas.map(([id, nombre]) => `<option value="${id}">${esc(nombre)}</option>`).join('');
  if (valEmpresa && empresasMapa.has(valEmpresa)) selEmpresa.value = valEmpresa;

  // Selector obra
  const obrasMapa = new Map();
  trabajadores.forEach(t => {
    (t.validaciones_obra || []).forEach(v => {
      if (v.obra?.id && !obrasMapa.has(v.obra.id)) {
        obrasMapa.set(v.obra.id, v.obra.nombre);
      }
    });
  });
  const obras = [...obrasMapa.entries()].sort((a, b) => a[1].localeCompare(b[1], 'es'));
  const selObra = document.getElementById('filtro-obra');
  const valObra = selObra.value;
  selObra.innerHTML = '<option value="">Todas las obras</option>' +
    obras.map(([id, nombre]) => `<option value="${id}">${esc(nombre)}</option>`).join('');
  if (valObra && obrasMapa.has(valObra)) selObra.value = valObra;
}

function aplicarFiltros() {
  const q = document.getElementById('filtro').value.toLowerCase();
  const empresaId = document.getElementById('filtro-empresa').value;
  const obraId = document.getElementById('filtro-obra').value;

  const filtrados = todosTrabajadores.filter(t => {
    const nombreCompleto = `${t.nombre || ''} ${t.apellidos || ''}`.toLowerCase();

    const coincideTexto = !q ||
      nombreCompleto.includes(q) ||
      (t.dni || '').toLowerCase().includes(q);

    const coincideEmpresa = !empresaId || t.empresa?.id === empresaId;

    const coincideObra = !obraId ||
      (t.validaciones_obra || []).some(v => v.obra?.id === obraId);

    return coincideTexto && coincideEmpresa && coincideObra;
  });

  renderTabla(filtrados);
}

function renderTabla(data) {
  const obraIdFiltro = document.getElementById('filtro-obra').value;
  if (data.length === 0) {
    document.getElementById('tabla-trabajadores').innerHTML = '<div class="vacio">No hay trabajadores</div>';
    return;
  }

  // Agrupar por empresa
  const porEmpresa = {};
  data.forEach(t => {
    const empresa = t.empresa?.nombre || 'Sin empresa asignada';
    if (!porEmpresa[empresa]) porEmpresa[empresa] = [];
    porEmpresa[empresa].push(t);
  });

  const empresasOrdenadas = Object.keys(porEmpresa).sort((a, b) => a.localeCompare(b, 'es'));

  const cabecera = `
    <thead>
      <tr>
        <th>Nombre</th>
        <th>DNI</th>
        <th>Teléfono</th>
        <th>Categoría</th>
        <th>Precio hora</th>
        <th>Estado doc.</th>
        <th>Obras</th>
        <th>Activo</th>
        <th>Acciones</th>
      </tr>
    </thead>`;

  let filasBody = '';

  empresasOrdenadas.forEach(empresa => {
    const trabajadores = porEmpresa[empresa];

    // Calcular badges
    let rojos = 0, naranjas = 0;
    trabajadores.forEach(t => {
      const estado = estadoDocumental(t.validaciones_obra);
      if (estado === 'rojo') rojos++;
      else if (estado === 'naranja') naranjas++;
    });

    const grupoAbierto = gruposAbiertos[empresa] !== false;
    const chevronClase = grupoAbierto ? 'grupo-empresa-chevron abierto' : 'grupo-empresa-chevron';
    const filaClase = grupoAbierto ? 'grupo-fila' : 'grupo-fila oculto';
    const empresaEsc = esc(empresa);

    const badgesHtml = [
      rojos > 0    ? `<span class="badge-empresa rojo">${rojos} rojo${rojos > 1 ? 's' : ''}</span>` : '',
      naranjas > 0 ? `<span class="badge-empresa naranja">${naranjas} naranja${naranjas > 1 ? 's' : ''}</span>` : '',
      `<span class="badge-empresa total">${trabajadores.length} trabajador${trabajadores.length > 1 ? 'es' : ''}</span>`
    ].join('');

    // Escapar empresa para uso en atributos JS: usar índice en lugar del nombre
    const grupoKey = empresaEsc;

    filasBody += `
      <tr class="grupo-empresa-cab" onclick="toggleGrupo(${JSON.stringify(empresa)})">
        <td colspan="9">
          <div class="grupo-empresa-label">
            <span class="${chevronClase}" id="chevron-${empresaEsc}">${grupoAbierto ? '▶' : '▶'}</span>
            ${empresaEsc}
            <div class="grupo-empresa-badges">${badgesHtml}</div>
          </div>
        </td>
      </tr>`;

    trabajadores.forEach(t => {
      const estadoGeneral = estadoDocumental(t.validaciones_obra);
      const obras = (t.validaciones_obra || []).map(v =>
        `<span class="pill ${esc(v.estado)}">${esc(v.obra?.nombre)}</span>`
      ).join(' ') || '—';

      const iconos = (habIconosPorTrabajador[t.id] || []).join(' ');
      const iconosHtml = iconos
        ? `<span class="iconos-hab" title="Habilitaciones: ${iconos}">${iconos}</span>`
        : '';

      filasBody += `
        <tr class="${filaClase}" data-grupo="${empresaEsc}">
          <td><strong>${esc(t.nombre)} ${esc(t.apellidos)}</strong>${iconosHtml}</td>
          <td>${esc(t.dni)}</td>
          <td>${esc(t.telefono || '—')}</td>
          <td>${esc(t.categoria || '—')}</td>
          <td>${formatearPrecio(t.precio_hora_personalizado)}</td>
          <td><span class="pill ${estadoGeneral}">${estadoGeneral}</span></td>
          <td>${obras}</td>
          <td><span class="pill ${t.activo ? 'verde' : 'gris'}">${t.activo ? 'Sí' : 'No'}</span></td>
          <td>
            <div class="acciones">
              <button class="btn-secundario" onclick="abrirEditarPorId('${t.id}')">Editar</button>${obraIdFiltro ? `
              <button class="btn-secundario peligro" onclick="abrirModalQuitar('${t.id}')">Quitar de la obra</button>` : ''}
            </div>
          </td>
        </tr>`;
    });
  });

  document.getElementById('tabla-trabajadores').innerHTML = `
    <table>
      ${cabecera}
      <tbody>${filasBody}</tbody>
    </table>`;

  // Aplicar estado de chevrons tras render
  empresasOrdenadas.forEach(empresa => {
    const abierto = gruposAbiertos[empresa] !== false;
    const chevron = document.getElementById(`chevron-${esc(empresa)}`);
    if (chevron) chevron.classList.toggle('abierto', abierto);
  });
}

function toggleGrupo(empresa) {
  const abierto = gruposAbiertos[empresa] !== false;
  gruposAbiertos[empresa] = !abierto;
  const chevron = document.getElementById(`chevron-${esc(empresa)}`);
  if (chevron) chevron.classList.toggle('abierto', !abierto);
  document.querySelectorAll(`tr.grupo-fila[data-grupo="${esc(empresa)}"]`).forEach(fila => {
    fila.classList.toggle('oculto', abierto);
  });
}

function estadoDocumental(validaciones) {
  if (!validaciones || validaciones.length === 0) return 'gris';
  if (validaciones.some(v => v.estado === 'rojo')) return 'rojo';
  if (validaciones.some(v => v.estado === 'naranja')) return 'naranja';
  return 'verde';
}

document.getElementById('filtro').addEventListener('input', aplicarFiltros);
document.getElementById('filtro-empresa').addEventListener('change', aplicarFiltros);
document.getElementById('filtro-obra').addEventListener('change', aplicarFiltros);

document.getElementById('btn-nuevo').onclick = () => {
  trabajadorEditandoId = null;
  document.getElementById('modal-titulo').textContent = 'Nuevo trabajador';
  document.getElementById('f-nombre').value = '';
  document.getElementById('f-apellidos').value = '';
  document.getElementById('f-dni').value = '';
  document.getElementById('f-telefono').value = '';
  document.getElementById('f-categoria').value = '';
  document.getElementById('f-precio-hora').value = '';
  document.getElementById('f-activo').value = 'true';
  ocultarError();
  document.getElementById('modal-trabajador').classList.add('visible');
};

function abrirEditarPorId(id) {
  const t = todosTrabajadores.find(x => x.id === id);
  if (!t) { alert('No se ha encontrado el trabajador.'); return; }
  trabajadorEditandoId = t.id;
  document.getElementById('modal-titulo').textContent = 'Editar trabajador';
  document.getElementById('f-nombre').value = t.nombre || '';
  document.getElementById('f-apellidos').value = t.apellidos || '';
  document.getElementById('f-dni').value = t.dni || '';
  document.getElementById('f-telefono').value = t.telefono || '';
  document.getElementById('f-categoria').value = t.categoria || '';
  document.getElementById('f-precio-hora').value = t.precio_hora_personalizado ?? '';
  document.getElementById('f-activo').value = String(t.activo);
  ocultarError();
  document.getElementById('modal-trabajador').classList.add('visible');
}

document.getElementById('btn-cancelar').onclick = () => {
  document.getElementById('modal-trabajador').classList.remove('visible');
};

document.getElementById('btn-guardar').onclick = async () => {
  const nombre = document.getElementById('f-nombre').value.trim();
  const apellidos = document.getElementById('f-apellidos').value.trim();
  const dni = document.getElementById('f-dni').value.trim().toUpperCase();
  const telefono = document.getElementById('f-telefono').value.trim();
  const categoria = document.getElementById('f-categoria').value.trim();
  const precioHoraRaw = document.getElementById('f-precio-hora').value.trim().replace(',', '.');
  const activo = document.getElementById('f-activo').value === 'true';

  if (!nombre) { mostrarError('El nombre es obligatorio.'); return; }
  if (!dni) { mostrarError('El DNI es obligatorio.'); return; }

  let precio_hora_personalizado = null;
  if (precioHoraRaw !== '') {
    precio_hora_personalizado = Number(precioHoraRaw);
    if (isNaN(precio_hora_personalizado) || precio_hora_personalizado < 0) {
      mostrarError('El precio hora debe ser un número válido.');
      return;
    }
  }

  const payload = {
    nombre, apellidos, dni, activo,
    telefono: telefono || null,
    categoria: categoria || null,
    precio_hora_personalizado
  };

  let error;
  if (trabajadorEditandoId) {
    ({ error } = await sb.from('trabajadores').update(payload).eq('id', trabajadorEditandoId));
  } else {
    ({ error } = await sb.from('trabajadores').insert(payload));
  }

  if (error) {
    mostrarError(error.code === '23505' ? 'Ya existe un trabajador con ese DNI.' : 'Error al guardar: ' + error.message);
    return;
  }

  document.getElementById('modal-trabajador').classList.remove('visible');
  await cargarTrabajadores();
};

function mostrarError(msg) {
  const el = document.getElementById('error-modal');
  el.textContent = msg;
  el.style.display = 'block';
}

function ocultarError() {
  document.getElementById('error-modal').style.display = 'none';
}

function esc(txt) {
  const d = document.createElement('div');
  d.textContent = String(txt || '');
  return d.innerHTML;
}

function formatearPrecio(valor) {
  if (valor === null || valor === undefined || valor === '') return '—';
  const n = Number(valor);
  if (isNaN(n)) return '—';
  return n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €/h';
}

// ----- Quitar trabajador de la obra -----
let quitarCtx = null;

function abrirModalQuitar(trabajadorId) {
  const sel = document.getElementById('filtro-obra');
  const obraId = sel.value;
  if (!obraId) return; // seguridad: solo con obra concreta
  const obraNombre = sel.selectedOptions[0] ? sel.selectedOptions[0].textContent : 'esta obra';
  const t = todosTrabajadores.find(x => x.id === trabajadorId);
  if (!t) return;
  quitarCtx = { trabajador_id: trabajadorId, obra_id: obraId };
  document.getElementById('quitar-intro').innerHTML =
    `Vas a quitar a <strong>${esc(t.nombre)} ${esc(t.apellidos)}</strong> de la obra <strong>${esc(obraNombre)}</strong>.<br><br>` +
    `Dejará de poder fichar con el QR de esta obra y desaparecerá de su listado. ` +
    `Su histórico de fichajes se conserva. Si vuelve a aparecer en un Excel de e-Coordina, se reincorporará automáticamente.`;
  const msg = document.getElementById('quitar-msg');
  msg.className = ''; msg.textContent = '';
  document.getElementById('btn-confirmar-quitar').disabled = false;
  document.getElementById('modal-quitar-overlay').classList.add('visible');
}

function cerrarModalQuitar() {
  document.getElementById('modal-quitar-overlay').classList.remove('visible');
  quitarCtx = null;
}

document.getElementById('btn-cancelar-quitar').addEventListener('click', cerrarModalQuitar);
document.getElementById('modal-quitar-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-quitar-overlay')) cerrarModalQuitar();
});

document.getElementById('btn-confirmar-quitar').addEventListener('click', async () => {
  if (!quitarCtx) return;
  const btn = document.getElementById('btn-confirmar-quitar');
  const msg = document.getElementById('quitar-msg');
  btn.disabled = true;
  msg.className = ''; msg.textContent = 'Quitando…';
  const { data, error } = await sb.rpc('quitar_trabajador_de_obra', {
    p_trabajador_id: quitarCtx.trabajador_id,
    p_obra_id: quitarCtx.obra_id
  });
  if (error) {
    msg.className = 'msg-error'; msg.textContent = 'Error: ' + error.message;
    btn.disabled = false; return;
  }
  if (data && data.ok === false) {
    msg.className = 'msg-error'; msg.textContent = 'Error: ' + (data.error || 'No se pudo quitar');
    btn.disabled = false; return;
  }
  msg.className = 'msg-ok'; msg.textContent = 'Trabajador quitado de la obra.';
  setTimeout(() => { cerrarModalQuitar(); cargarTrabajadores(); }, 700);
});
</script>

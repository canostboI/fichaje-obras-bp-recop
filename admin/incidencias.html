  .sidebar-brand { padding: 18px 16px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; justify-content: center; gap: 14px; }

  .sidebar-section { padding: 18px 14px 6px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--texto2); }

<script>
const SUPABASE_URL = 'https://istrnsicleopzbsrapsw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzdHJuc2ljbGVvcHpic3JhcHN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTIxMTYsImV4cCI6MjA5MTM4ODExNn0.5UXV2LWPXmbfLI7rKpZSG9YBzZsesjckHnhQabA0mTY';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
AutoLogout.init(sb);

let datosActuales = [];   // incidencias del periodo actual (para resumen e informe)

(async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '../'; return; }
  const { data: u } = await sb.from('usuarios_app').select('rol').eq('auth_user_id', session.user.id).single();
  if (!u || u.rol !== 'admin') { window.location.href = '../'; return; }
  aplicarRango('mes');
  await cargarObras();
  await cargarTipos();
  await buscar();
})();

document.getElementById('btn-salir').onclick = async () => { await sb.auth.signOut(); window.location.href = '../'; };

async function cargarObras() {
  const { data } = await sb.from('obras').select('id, nombre, estado').neq('estado', 'oculta').order('nombre');
  const select = document.getElementById('filtro-obra');
  (data || []).forEach(o => {
    const opt = document.createElement('option');
    opt.value = o.id;
    opt.textContent = (o.estado && o.estado !== 'activa') ? `${o.nombre} (${o.estado})` : o.nombre;
    select.appendChild(opt);
  });
}

async function cargarTipos() {
  const { data } = await sb.from('incidencias').select('tipo').limit(1000);
  const tipos = [...new Set((data || []).map(d => d.tipo).filter(Boolean))].sort();
  const select = document.getElementById('filtro-tipo');
  tipos.forEach(t => { const opt = document.createElement('option'); opt.value = t; opt.textContent = t; select.appendChild(opt); });
}

// ===== Rangos rápidos =====
function aplicarRango(rango) {
  const hoy = new Date();
  let desde, hasta;
  if (rango === 'hoy') {
    desde = hasta = hoy;
  } else if (rango === '7dias') {
    hasta = hoy;
    desde = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate() - 6);
  } else if (rango === 'mes') {
    desde = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
    hasta = hoy;
  } else if (rango === 'mes-anterior') {
    desde = new Date(hoy.getFullYear(), hoy.getMonth() - 1, 1);
    hasta = new Date(hoy.getFullYear(), hoy.getMonth(), 0);
  }
  document.getElementById('filtro-desde').value = aISO(desde);
  document.getElementById('filtro-hasta').value = aISO(hasta);
}
function aISO(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }

document.querySelectorAll('.btn-rapido').forEach(b => {
  b.onclick = () => { aplicarRango(b.dataset.rango); buscar(); };
});
document.getElementById('btn-buscar').onclick = buscar;

// ===== Búsqueda =====
async function buscar() {
  document.getElementById('tabla-incidencias').innerHTML = '<div class="cargando">Cargando…</div>';
  document.getElementById('resumen').innerHTML = '<div class="cargando">Cargando…</div>';

  const fDesde = document.getElementById('filtro-desde').value;
  const fHasta = document.getElementById('filtro-hasta').value;
  const obraId = document.getElementById('filtro-obra').value;
  const tipo   = document.getElementById('filtro-tipo').value;

  let query = sb.from('incidencias')
    .select('id, tipo, detalle, comentario, created_at, trabajador_id, obra_id, trabajador:trabajador_id(nombre, apellidos, dni), obra:obra_id(nombre)')
    .order('created_at', { ascending: false }).limit(1000);

  if (fDesde) {
    const [y, m, d] = fDesde.split('-').map(Number);
    query = query.gte('created_at', new Date(y, m - 1, d, 0, 0, 0, 0).toISOString());
  }
  if (fHasta) {
    const [y, m, d] = fHasta.split('-').map(Number);
    query = query.lte('created_at', new Date(y, m - 1, d, 23, 59, 59, 999).toISOString());
  }
  if (obraId) query = query.eq('obra_id', obraId);
  if (tipo)   query = query.eq('tipo', tipo);

  const { data, error } = await query;

  if (error) {
    document.getElementById('badge-total').textContent = 'Error';
    document.getElementById('tabla-incidencias').innerHTML = '<div class="vacio">Error al cargar: ' + esc(error.message) + '</div>';
    document.getElementById('resumen').innerHTML = '<div class="vacio">—</div>';
    return;
  }

  datosActuales = data || [];
  pintarResumen(datosActuales);
  pintarListado(datosActuales);
}

// ===== Causas: cada incidencia puede aportar una o varias causas =====
// bloqueo_rojo nuevo: detalle = JSON array de motivos → una causa por motivo
// bloqueo_rojo antiguo: texto genérico → "Documentación en rojo (sin detalle)"
// fuera_de_zona: causa fija "Fuera de zona GPS"
function causasDenegacion(inc) {
  if (inc.tipo === 'fuera_de_zona') return ['Fuera de zona GPS'];
  if (inc.tipo !== 'bloqueo_rojo') return null; // no es denegación
  const det = (inc.detalle || '').trim();
  try {
    const arr = JSON.parse(det);
    if (Array.isArray(arr) && arr.length > 0) return arr.map(x => String(x).trim()).filter(Boolean);
  } catch (e) { /* no es JSON: registro antiguo */ }
  return ['Documentación en rojo (sin detalle)'];
}

// ===== Resumen: cuenta TRABAJADORES DISTINTOS por causa (no intentos) =====
function calcularResumen(incs) {
  const porCausa = new Map();          // causa → Set(trabajador_id)
  const porObra  = new Map();          // obra → Set("trabajador|causa")
  const trabajadoresDenegados = new Set();

  incs.forEach(i => {
    const causas = causasDenegacion(i);
    if (!causas) return;
    const tid = i.trabajador_id || 'desconocido';
    const obraNombre = i.obra?.nombre || 'Obra desconocida';
    trabajadoresDenegados.add(tid);
    causas.forEach(c => {
      if (!porCausa.has(c)) porCausa.set(c, new Set());
      porCausa.get(c).add(tid);
      if (!porObra.has(obraNombre)) porObra.set(obraNombre, new Set());
      porObra.get(obraNombre).add(tid + '|' + c);
    });
  });

  const causas = [...porCausa.entries()]
    .map(([causa, set]) => ({ causa, n: set.size }))
    .sort((a, b) => b.n - a.n);
  const obras = [...porObra.entries()]
    .map(([obra, set]) => ({ obra, n: set.size }))
    .sort((a, b) => b.n - a.n);
  const totalIncidencias = causas.reduce((s, c) => s + c.n, 0);

  return { causas, obras, totalIncidencias, totalTrabajadores: trabajadoresDenegados.size };
}

function pintarResumen(incs) {
  const r = calcularResumen(incs);
  document.getElementById('badge-resumen').textContent =
    r.totalIncidencias + ' incidencias · ' + r.totalTrabajadores + ' trabajadores';

  if (r.totalIncidencias === 0) {
    document.getElementById('resumen').innerHTML = '<div class="vacio">Sin accesos denegados en el periodo ✓</div>';
    return;
  }

  document.getElementById('resumen').innerHTML = `
    <div class="resumen-grid">
      <div class="resumen-col">
        <h3>Por causa (trabajadores distintos)</h3>
        <table><tbody>
          ${r.causas.map(c => `<tr>
            <td>${iconoCausa(c.causa)} ${esc(c.causa)}</td>
            <td style="text-align:right; width:80px;"><span class="num-grande ${c.causa === 'Fuera de zona GPS' ? 'num-naranja' : 'num-rojo'}">${c.n}</span></td>
          </tr>`).join('')}
        </tbody></table>
      </div>
      <div class="resumen-col">
        <h3>Por obra</h3>
        <table><tbody>
          ${r.obras.map(o => `<tr>
            <td>🏗 ${esc(o.obra)}</td>
            <td style="text-align:right; width:80px;"><span class="num-grande">${o.n}</span></td>
          </tr>`).join('')}
        </tbody></table>
      </div>
    </div>`;
}

function iconoCausa(c) {
  return c === 'Fuera de zona GPS' ? '📍' : '🔴';
}

// ===== Listado detallado =====
function pintarListado(data) {
  if (!data || data.length === 0) {
    document.getElementById('badge-total').textContent = '0 incidencias';
    document.getElementById('tabla-incidencias').innerHTML = '<div class="vacio">No hay incidencias ✓</div>';
    return;
  }
  document.getElementById('badge-total').textContent = data.length + ' registros';
  document.getElementById('tabla-incidencias').innerHTML = `
    <table><thead><tr>
      <th>Trabajador</th><th>DNI</th><th>Obra</th><th>Tipo</th><th>Detalle</th><th>Fecha y hora</th>
    </tr></thead><tbody>
    ${data.map(i => `<tr>
      <td><strong>${esc(i.trabajador?.nombre)} ${esc(i.trabajador?.apellidos)}</strong></td>
      <td>${esc(i.trabajador?.dni)}</td>
      <td>${esc(i.obra?.nombre)}</td>
      <td><span class="pill ${colorTipo(i.tipo)}">${esc(i.tipo)}</span></td>
      <td class="detalle-celda">${detalleBonito(i)}${i.comentario ? `<div class="comentario">${esc(i.comentario)}</div>` : ''}</td>
      <td>${formatFechaHora(i.created_at)}</td>
    </tr>`).join('')}
    </tbody></table>`;
}

// Si el detalle es un JSON array de motivos, mostrarlo legible
function detalleBonito(i) {
  const det = (i.detalle || '').trim();
  if (!det) return '—';
  try {
    const arr = JSON.parse(det);
    if (Array.isArray(arr)) return arr.map(m => '• ' + esc(String(m))).join('<br>');
  } catch (e) { /* texto normal */ }
  return esc(det);
}

function colorTipo(tipo) {
  if (!tipo) return 'gris';
  const t = tipo.toLowerCase();
  if (t.includes('rojo') || t.includes('autocierre') || t.includes('cierre')) return 'rojo';
  if (t.includes('naranja') || t.includes('aviso') || t.includes('zona')) return 'naranja';
  return 'gris';
}

// ===== Informe imprimible =====
document.getElementById('btn-imprimir').onclick = () => {
  const r = calcularResumen(datosActuales);
  const fDesde = document.getElementById('filtro-desde').value;
  const fHasta = document.getElementById('filtro-hasta').value;
  const selObra = document.getElementById('filtro-obra');
  const obraNombre = selObra.value ? selObra.options[selObra.selectedIndex].text : 'Todas las obras';
  const periodo = (fDesde ? formatFecha(fDesde) : 'inicio') + ' — ' + (fHasta ? formatFecha(fHasta) : 'hoy');

  // Detalle del informe: solo denegaciones, deduplicadas por trabajador+causa
  const vistos = new Set();
  const filas = [];
  // Recorremos de más antiguo a más reciente para quedarnos con la primera vez
  [...datosActuales].sort((a, b) => new Date(a.created_at) - new Date(b.created_at)).forEach(i => {
    const causas = causasDenegacion(i);
    if (!causas) return;
    causas.forEach(c => {
      const clave = (i.trabajador_id || '?') + '|' + c;
      if (vistos.has(clave)) return;
      vistos.add(clave);
      filas.push({
        nombre: ((i.trabajador?.nombre || '') + ' ' + (i.trabajador?.apellidos || '')).trim() || '—',
        dni: i.trabajador?.dni || '—',
        obra: i.obra?.nombre || '—',
        causa: c,
        fecha: formatFechaHora(i.created_at)
      });
    });
  });

  document.getElementById('informe-print').innerHTML = `
    <h1>Informe de incidencias de acceso</h1>
    <div class="sub">
      Obra: <strong>${esc(obraNombre)}</strong> &nbsp;·&nbsp;
      Periodo: <strong>${esc(periodo)}</strong> &nbsp;·&nbsp;
      Generado: ${new Date().toLocaleDateString('es-ES')} ${new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })}
    </div>

    <div class="total-linea">Total: ${r.totalIncidencias} incidencias · ${r.totalTrabajadores} trabajadores afectados</div>

    <h2>Resumen por causa</h2>
    <table><thead><tr><th>Causa de la denegación</th><th style="width:120px;">Trabajadores</th></tr></thead><tbody>
      ${r.causas.length ? r.causas.map(c => `<tr><td>${esc(c.causa)}</td><td>${c.n}</td></tr>`).join('') : '<tr><td colspan="2">Sin denegaciones en el periodo</td></tr>'}
    </tbody></table>

    <h2>Resumen por obra</h2>
    <table><thead><tr><th>Obra</th><th style="width:120px;">Incidencias</th></tr></thead><tbody>
      ${r.obras.length ? r.obras.map(o => `<tr><td>${esc(o.obra)}</td><td>${o.n}</td></tr>`).join('') : '<tr><td colspan="2">—</td></tr>'}
    </tbody></table>

    <h2>Detalle (primera vez registrada de cada caso)</h2>
    <table><thead><tr><th>Trabajador</th><th>DNI</th><th>Obra</th><th>Causa</th><th>Fecha</th></tr></thead><tbody>
      ${filas.length ? filas.map(f => `<tr><td>${esc(f.nombre)}</td><td>${esc(f.dni)}</td><td>${esc(f.obra)}</td><td>${esc(f.causa)}</td><td>${esc(f.fecha)}</td></tr>`).join('') : '<tr><td colspan="5">Sin denegaciones en el periodo</td></tr>'}
    </tbody></table>

    <div class="pie">
      Cada caso cuenta una vez por trabajador y causa, aunque haya habido varios intentos.
      Generado con Fichaje Obras — Bosch Pascual / Rècop.
    </div>`;

  window.print();
};

function esc(txt) { const d = document.createElement('div'); d.textContent = String(txt || ''); return d.innerHTML; }
function formatFechaHora(iso) { if (!iso) return '—'; const d = new Date(iso); return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' }) + ' ' + d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }); }
function formatFecha(isoFecha) { const [y, m, d] = isoFecha.split('-'); return d + '/' + m + '/' + y; }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resumen mensual — Panel Encargado</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/branding.js"></script>
  <script src="../js/auto-logout.js"></script>
  <script src="../js/excel-proforma.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f4f4f4; color: #222; }
    :root { --color-principal: #1a1a2e; }

    header {
      background: var(--color-principal); color: white;
      padding: 1rem 1.5rem;
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-logo { max-height: 32px; max-width: 120px; display: none; }
    header h1 { font-size: 1.1rem; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    header button {
      background: transparent; border: 1px solid #fff;
      color: white; padding: 0.3rem 0.8rem;
      border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    }
    header a.btn-volver {
      background: transparent; border: 1px solid rgba(255,255,255,0.5);
      color: white; padding: 0.3rem 0.8rem;
      border-radius: 6px; font-size: 0.85rem; text-decoration: none;
    }
    header a.btn-volver:hover { background: rgba(255,255,255,0.1); }

    main { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem; }

    .card {
      background: white; border-radius: 10px;
      padding: 1.2rem 1.3rem; margin-bottom: 1.2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 1.05rem; margin-bottom: 0.8rem; color: #333; }

    select, input[type="month"] {
      padding: 0.55rem 0.7rem;
      border: 1px solid #ccc; border-radius: 6px;
      font-size: 1rem; background: white; font-family: inherit;
    }
    .filtros { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .btn-mes { background: var(--color-principal); color: white; border: none; padding: 0.55rem 0.9rem; border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-family: inherit; }
    .msg-info { font-size: 0.85rem; color: #777; }
    .msg-info.err { color: #b71c1c; }
    .msg-info.aviso { color: #e65100; }

    .leyenda { display: flex; gap: 14px; flex-wrap: wrap; margin: 0.8rem 0 0; font-size: 0.8rem; color: #777; }
    .leyenda span { display: inline-flex; align-items: center; gap: 5px; }
    .cuadro { width: 13px; height: 13px; border-radius: 3px; display: inline-block; border: 1px solid #ddd; }
    .cuadro.finde { background: #ececec; }
    .cuadro.autocierre { background: #ffe0b2; }

    .seccion { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; margin-bottom: 1.2rem; }
    .seccion-cab { padding: 0.9rem 1.2rem; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .seccion-cab h2 { font-size: 0.92rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: #444; }
    .badge { font-size: 0.75rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #e3f2fd; color: #1565c0; }

    /* ── Tabla mensual con scroll horizontal y nombre fijo ── */
    .tabla-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table.mes { border-collapse: collapse; font-size: 0.78rem; width: max-content; min-width: 100%; }
    table.mes th, table.mes td { border-bottom: 1px solid #ececec; padding: 5px 6px; text-align: center; white-space: nowrap; font-variant-numeric: tabular-nums; }
    table.mes thead th { font-size: 0.66rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.3px; background: white; position: sticky; top: 0; }
    table.mes th.col-nombre, table.mes td.col-nombre {
      position: sticky; left: 0; z-index: 2; background: white;
      text-align: left; padding-left: 12px; padding-right: 10px;
      min-width: 130px; max-width: 170px; overflow: hidden; text-overflow: ellipsis;
      box-shadow: 2px 0 0 #ececec;
    }
    table.mes thead th.col-nombre { z-index: 3; }
    table.mes td.col-nombre .nombre { font-weight: 600; color: #222; font-size: 0.78rem; white-space: normal; line-height: 1.25; }
    table.mes td.col-nombre .sub { font-size: 0.66rem; color: #999; }
    table.mes th.dia { min-width: 32px; }
    table.mes th.dia .num { display: block; font-size: 0.72rem; color: #444; }
    table.mes th.dia .letra { display: block; font-size: 0.6rem; color: #aaa; }
    table.mes td.celda { color: #222; }
    table.mes td.celda.cero { color: #bbb; }
    table.mes th.finde, table.mes td.finde { background: #ececec; }
    table.mes td.autocierre { background: #ffe0b2; color: #a35200; font-weight: 700; }
    table.mes th.col-total, table.mes td.col-total {
      position: sticky; right: 0; z-index: 2; background: #f6f6f6;
      font-weight: 700; min-width: 56px; box-shadow: -2px 0 0 #ececec;
    }
    table.mes thead th.col-total { z-index: 3; }
    table.mes tr.fila-total td { background: #f6f6f6; font-weight: 700; border-top: 2px solid #ddd; }
    table.mes tr.fila-total td.col-nombre { background: #f6f6f6; }
    table.mes tr.fila-total td.col-total { background: #fff3e0; color: #e65100; }

    .vacio    { padding: 1.6rem 1.2rem; text-align: center; color: #888; font-style: italic; font-size: 0.9rem; }
    .cargando { padding: 1.6rem 1.2rem; text-align: center; color: #888; font-style: italic; font-size: 0.9rem; }
    .nota-lectura { font-size: 0.8rem; color: #999; margin-bottom: 1rem; }
    #msg-error { color: #b71c1c; display: none; padding: 1rem; }

    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; }
      .header-right { width: 100%; }
      main { padding: 0 0.5rem; }
      table.mes th.col-nombre, table.mes td.col-nombre { min-width: 110px; max-width: 130px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <img id="header-logo" class="header-logo" alt="">
    <h1>📊 Resumen mensual</h1>
  </div>
  <div class="header-right">
    <a href="index.html" class="btn-volver">← Volver</a>
    <button id="btn-logout">Cerrar sesión</button>
  </div>
</header>

<main>

  <div class="card" id="card-selector" style="display:none">
    <h2>Selecciona una obra</h2>
    <select id="select-obra">
      <option value="">-- Elige obra --</option>
    </select>
  </div>

  <div id="panel-obra" style="display:none">
    <div class="card">
      <h2 id="titulo-obra"></h2>
      <div class="filtros">
        <input type="month" id="filtro-mes">
        <button class="btn-mes" id="btn-mes-actual">Mes actual</button>
        <span class="msg-info" id="msg-info"></span>
      </div>
      <div class="leyenda">
        <span><span class="cuadro finde"></span> Fin de semana</span>
        <span><span class="cuadro autocierre"></span> Día con cierre automático</span>
      </div>
    </div>

    <p class="nota-lectura">Vista de consulta. Para correcciones de fichajes, contacta con el jefe de obra.</p>

    <div id="zona-tablas">
      <div class="seccion"><div class="cargando">Cargando…</div></div>
    </div>
  </div>

  <p id="msg-error"></p>
</main>

<script>
  const SUPABASE_URL = 'https://istrnsicleopzbsrapsw.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzdHJuc2ljbGVvcHpic3JhcHN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTIxMTYsImV4cCI6MjA5MTM4ODExNn0.5UXV2LWPXmbfLI7rKpZSG9YBzZsesjckHnhQabA0mTY';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  AutoLogout.init(sb);

  let obraActualId = null;

  function esc(txt) {
    const d = document.createElement('div');
    d.textContent = String(txt || '');
    return d.innerHTML;
  }

  function mostrarError(txt) {
    const e = document.getElementById('msg-error');
    e.textContent = txt; e.style.display = 'block';
  }

  function mesActual() {
    const a = new Date();
    return a.getFullYear() + '-' + String(a.getMonth() + 1).padStart(2, '0');
  }

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = '../index.html'; return; }

    const { data: usuario, error } = await sb
      .from('usuarios_app')
      .select('id, rol')
      .eq('auth_user_id', session.user.id)
      .single();

    if (error || !usuario || usuario.rol !== 'encargado') {
      mostrarError('Acceso denegado. No tienes rol de encargado.');
      return;
    }

    const { data: asignaciones } = await sb
      .from('usuarios_obra')
      .select('obra_id, obras(id, nombre, empresa_marca)')
      .eq('usuario_app_id', usuario.id)
      .eq('rol_en_obra', 'encargado');

    if (!asignaciones || asignaciones.length === 0) {
      mostrarError('No tienes ninguna obra asignada.');
      return;
    }

    if (asignaciones.length === 1) {
      const obra = asignaciones[0].obras;
      await cargarObra(obra.id, obra.nombre, obra.empresa_marca);
    } else {
      const select = document.getElementById('select-obra');
      asignaciones.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a.obras.id;
        opt.textContent = a.obras.nombre;
        opt.dataset.marca = a.obras.empresa_marca || 'bosch_pascual';
        select.appendChild(opt);
      });
      document.getElementById('card-selector').style.display = 'block';

      select.addEventListener('change', async () => {
        const opt = select.options[select.selectedIndex];
        if (!opt.value) return;
        document.getElementById('card-selector').style.display = 'none';
        await cargarObra(opt.value, opt.text, opt.dataset.marca);
      });
    }
  }

  async function cargarObra(obraId, obraNombre, empresaMarca) {
    obraActualId = obraId;

    const marca = empresaMarca || 'bosch_pascual';
    const branding = aplicarBranding(marca);
    const logoImg = document.getElementById('header-logo');
    logoImg.src = '../' + branding.logo_blanco;
    logoImg.alt = branding.nombre;
    logoImg.style.display = 'block';

    document.getElementById('titulo-obra').textContent = obraNombre;
    document.getElementById('filtro-mes').value = mesActual();
    document.getElementById('panel-obra').style.display = 'block';

    await cargarResumen();
  }

  document.getElementById('filtro-mes').addEventListener('change', cargarResumen);
  document.getElementById('btn-mes-actual').addEventListener('click', async () => {
    document.getElementById('filtro-mes').value = mesActual();
    await cargarResumen();
  });

  document.getElementById('btn-logout').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = '../index.html';
  });

  // ===================================================================
  // CARGA DE DATOS — sin precio_hora (el encargado no ve datos económicos)
  // ===================================================================
  async function obtenerFichajesMes(obraId, mes) {
    const [year, month] = mes.split('-').map(Number);
    const desde = new Date(year, month - 1, 1, 0, 0, 0, 0);
    const hasta = new Date(year, month, 1, 0, 0, 0, 0);

    let { data, error } = await sb.from('fichajes')
      .select(`id, tipo, hora, cierre_automatico, trabajador_id,
        trabajador:trabajador_id(id, nombre, apellidos, dni, categoria, empresa:empresa_id(nombre))`)
      .eq('obra_id', obraId).gte('hora', desde.toISOString()).lt('hora', hasta.toISOString())
      .order('hora', { ascending: true });
    if (!error) return data || [];

    const fallback = await sb.from('fichajes')
      .select(`id, tipo, hora, cierre_automatico, trabajador_id,
        trabajador:trabajador_id(id, nombre, apellidos, dni, categoria)`)
      .eq('obra_id', obraId).gte('hora', desde.toISOString()).lt('hora', hasta.toISOString())
      .order('hora', { ascending: true });
    if (fallback.error) throw fallback.error;
    return fallback.data || [];
  }

  // ===================================================================
  // RENDER DEL RESUMEN MENSUAL (solo lectura)
  // ===================================================================
  async function cargarResumen() {
    const zona = document.getElementById('zona-tablas');
    const msg  = document.getElementById('msg-info');
    const mes  = document.getElementById('filtro-mes').value;
    msg.className = 'msg-info'; msg.textContent = '';

    if (!obraActualId) return;
    if (!mes || !/^\d{4}-\d{2}$/.test(mes)) { msg.className = 'msg-info err'; msg.textContent = 'Selecciona un mes.'; return; }
    if (!window.ExcelProforma || !window.ExcelProforma.construirResumenTrabajadores) {
      msg.className = 'msg-info err';
      msg.textContent = 'No se ha cargado la versión actualizada de js/excel-proforma.js. Recarga la página.';
      return;
    }

    zona.innerHTML = '<div class="seccion"><div class="cargando">Cargando…</div></div>';

    let fichajes;
    try {
      fichajes = await obtenerFichajesMes(obraActualId, mes);
    } catch (e) {
      zona.innerHTML = '';
      msg.className = 'msg-info err';
      msg.textContent = 'Error cargando fichajes: ' + (e.message || e);
      return;
    }

    if (!fichajes || fichajes.length === 0) {
      zona.innerHTML = '<div class="seccion"><div class="vacio">No hay fichajes en ese mes para esta obra.</div></div>';
      return;
    }

    const [year, month] = mes.split('-').map(Number);
    const diasMes = new Date(year, month, 0).getDate();

    const grupos = window.ExcelProforma.agruparPorEmpresa(fichajes);
    const nombresEmpresa = Object.keys(grupos).sort((a, b) => a.localeCompare(b, 'es'));

    let html = '';
    let totalAutocierres = 0;

    nombresEmpresa.forEach(nombreEmpresa => {
      const trabajadores = window.ExcelProforma.construirResumenTrabajadores(grupos[nombreEmpresa], diasMes);
      trabajadores.forEach(t => { totalAutocierres += (t.autocierres_mes || 0); });
      html += renderTablaEmpresa(nombreEmpresa, trabajadores, year, month, diasMes);
    });

    zona.innerHTML = html;

    if (totalAutocierres > 0) {
      msg.className = 'msg-info aviso';
      msg.textContent = `⚠️ ${totalAutocierres} ${totalAutocierres === 1 ? 'salida' : 'salidas'} con cierre automático este mes.`;
    }
  }

  function renderTablaEmpresa(nombreEmpresa, trabajadores, year, month, diasMes) {
    const findes = new Set();
    for (let d = 1; d <= diasMes; d++) {
      const dow = new Date(year, month - 1, d).getDay();
      if (dow === 0 || dow === 6) findes.add(d);
    }
    const letras = ['D','L','M','X','J','V','S'];

    let thDias = '';
    for (let d = 1; d <= diasMes; d++) {
      const letra = letras[new Date(year, month - 1, d).getDay()];
      thDias += `<th class="dia${findes.has(d) ? ' finde' : ''}"><span class="num">${d}</span><span class="letra">${letra}</span></th>`;
    }

    let filas = '';
    const totalDia = {};
    for (let d = 1; d <= diasMes; d++) totalDia[d] = 0;
    let totalEmpresa = 0;

    trabajadores.forEach(t => {
      let celdas = '';
      for (let d = 1; d <= diasMes; d++) {
        const h = t.dias[d] || 0;
        totalDia[d] += h;
        const esAuto = (t.dias_autocierre[d] || 0) > 0;
        const clases = ['celda'];
        if (findes.has(d)) clases.push('finde');
        if (esAuto) clases.push('autocierre');
        if (h === 0 && !esAuto) clases.push('cero');
        celdas += `<td class="${clases.join(' ')}">${h > 0 ? formatHoras(h) : '·'}</td>`;
      }
      totalEmpresa += t.horas_mes;
      filas += `<tr>
        <td class="col-nombre">
          <div class="nombre">${esc(t.nombre)}</div>
          <div class="sub">${esc(t.dni || '')}</div>
        </td>
        ${celdas}
        <td class="col-total">${formatHoras(t.horas_mes)}</td>
      </tr>`;
    });

    let celdasTotal = '';
    for (let d = 1; d <= diasMes; d++) {
      const h = redondear2(totalDia[d]);
      celdasTotal += `<td class="${findes.has(d) ? 'finde' : ''}">${h > 0 ? formatHoras(h) : '·'}</td>`;
    }

    return `
    <div class="seccion">
      <div class="seccion-cab">
        <h2>${esc(nombreEmpresa)}</h2>
        <span class="badge">${trabajadores.length} trabajador${trabajadores.length === 1 ? '' : 'es'}</span>
      </div>
      <div class="tabla-scroll">
        <table class="mes">
          <thead>
            <tr>
              <th class="col-nombre">Trabajador</th>
              ${thDias}
              <th class="col-total">Horas</th>
            </tr>
          </thead>
          <tbody>
            ${filas}
            <tr class="fila-total">
              <td class="col-nombre">TOTAL</td>
              ${celdasTotal}
              <td class="col-total">${formatHoras(redondear2(totalEmpresa))}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>`;
  }

  function formatHoras(n) {
    return Number(n).toLocaleString('es-ES', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }

  function redondear2(n) {
    return Math.round((Number(n) || 0) * 100) / 100;
  }

  init();
</script>
</body>
</html>

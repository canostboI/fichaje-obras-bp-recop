<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Acceso — Fichaje Obras</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --azul: #1e3a5f;
    --gris-fondo: #f4f6f8;
    --gris-borde: #d0d7de;
    --rojo: #c0392b;
    --verde: #1e7e34;
    --texto: #1a1a1a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--gris-fondo);
    color: var(--texto);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tarjeta {
    background: white;
    border-radius: 16px;
    padding: 40px 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    margin: 20px;
  }
  .logos-marcas {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--gris-borde);
  }
  .logos-marcas img {
    max-height: 44px;
    max-width: 130px;
    object-fit: contain;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--azul);
    margin: 0 0 4px;
  }
  .logo p {
    font-size: 13px;
    color: #888;
    margin: 0;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  input {
    width: 100%;
    font-size: 16px;
    padding: 13px 14px;
    border: 2px solid var(--gris-borde);
    border-radius: 10px;
    font-family: inherit;
    margin-bottom: 18px;
  }
  input:focus {
    outline: none;
    border-color: var(--azul);
  }
  button {
    width: 100%;
    font-size: 17px;
    font-weight: 600;
    padding: 15px;
    background: var(--azul);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    margin-top: 4px;
  }
  button:disabled { background: #b0b8c1; cursor: not-allowed; }
  button:active:not(:disabled) { transform: scale(0.98); }
  .error {
    background: #fdecea;
    color: var(--rojo);
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    margin-top: 16px;
    text-align: center;
    display: none;
  }
  .aviso-ok {
    background: #e8f5e9;
    color: var(--verde);
    padding: 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    margin-top: 16px;
    text-align: center;
    display: none;
    line-height: 1.5;
  }
  .spinner-wrap {
    text-align: center;
    padding: 10px 0 0;
    display: none;
  }
  .spinner {
    display: inline-block;
    width: 26px; height: 26px;
    border: 3px solid #ddd;
    border-top-color: var(--azul);
    border-radius: 50%;
    animation: girar 0.9s linear infinite;
  }
  @keyframes girar { to { transform: rotate(360deg); } }
  .enlace-cambio {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: var(--azul);
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    width: 100%;
    padding: 0;
    font-weight: 500;
  }
  .nota-registro {
    font-size: 13px;
    color: #666;
    line-height: 1.5;
    margin: -6px 0 18px;
  }
</style>
</head>
<body>
<div class="tarjeta">

  <div class="logos-marcas">
    <img src="assets/logos/bosch_pascual_logo.svg" alt="Bosch Pascual">
    <img src="assets/logos/recop_logo.svg" alt="Rècop">
  </div>

  <div class="logo">
    <h1>Fichaje Obras</h1>
    <p>Panel de gestión — V2</p>
  </div>

  <!-- ============ VISTA LOGIN ============ -->
  <div id="vista-login">
    <label for="email">Correo electrónico</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">

    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">

    <button id="btn-login">Entrar</button>

    <button class="enlace-cambio" id="ir-registro" type="button">¿Primera vez? Crea tu contraseña</button>
  </div>

  <!-- ============ VISTA REGISTRO (primera vez) ============ -->
  <div id="vista-registro" style="display:none;">
    <p class="nota-registro">
      Usa el <strong>mismo correo</strong> que te ha dado de alta el
      administrador. Elige una contraseña y te enviaremos un email para
      confirmar tu cuenta.
    </p>

    <label for="reg-email">Correo electrónico</label>
    <input type="email" id="reg-email" placeholder="tu@email.com" autocomplete="email">

    <label for="reg-pass">Contraseña (mínimo 8 caracteres)</label>
    <input type="password" id="reg-pass" placeholder="••••••••" autocomplete="new-password">

    <label for="reg-pass2">Repite la contraseña</label>
    <input type="password" id="reg-pass2" placeholder="••••••••" autocomplete="new-password">

    <button id="btn-registro">Crear mi cuenta</button>

    <button class="enlace-cambio" id="ir-login" type="button">← Volver a Entrar</button>
  </div>

  <div class="error" id="error-box"></div>
  <div class="aviso-ok" id="ok-box"></div>
  <div class="spinner-wrap" id="spinner"><div class="spinner"></div></div>
</div>

<script>
// === Supabase inline ===
const SUPABASE_URL = 'https://istrnsicleopzbsrapsw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzdHJuc2ljbGVvcHpic3JhcHN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTIxMTYsImV4cCI6MjA5MTM4ODExNn0.5UXV2LWPXmbfLI7rKpZSG9YBzZsesjckHnhQabA0mTY';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const emailEl  = document.getElementById('email');
const passEl   = document.getElementById('password');
const btnLogin = document.getElementById('btn-login');
const errorBox = document.getElementById('error-box');
const okBox    = document.getElementById('ok-box');
const spinner  = document.getElementById('spinner');

const vistaLogin    = document.getElementById('vista-login');
const vistaRegistro = document.getElementById('vista-registro');
const regEmailEl = document.getElementById('reg-email');
const regPassEl  = document.getElementById('reg-pass');
const regPass2El = document.getElementById('reg-pass2');
const btnRegistro = document.getElementById('btn-registro');

// Si ya hay sesión activa, redirigir directamente
(async function () {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await redirigirSegunRol();
})();

function mostrarError(msg) {
  okBox.style.display = 'none';
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
}

function mostrarOk(msg) {
  errorBox.style.display = 'none';
  okBox.textContent = msg;
  okBox.style.display = 'block';
}

function ocultarError() {
  errorBox.style.display = 'none';
  okBox.style.display = 'none';
}

function setCargando(val) {
  btnLogin.disabled = val;
  btnRegistro.disabled = val;
  spinner.style.display = val ? 'block' : 'none';
}

// ==== Cambio de vista ====
document.getElementById('ir-registro').addEventListener('click', () => {
  ocultarError();
  vistaLogin.style.display = 'none';
  vistaRegistro.style.display = 'block';
  // Si ya había escrito el email en el login, lo aprovechamos
  if (emailEl.value.trim() && !regEmailEl.value) regEmailEl.value = emailEl.value.trim();
});

document.getElementById('ir-login').addEventListener('click', () => {
  ocultarError();
  vistaRegistro.style.display = 'none';
  vistaLogin.style.display = 'block';
});

// ==== Login ====
passEl.addEventListener('keypress', e => {
  if (e.key === 'Enter') btnLogin.click();
});

btnLogin.addEventListener('click', async () => {
  ocultarError();
  const email = emailEl.value.trim();
  const pass  = passEl.value;

  if (!email || !pass) {
    mostrarError('Introduce tu correo y contraseña.');
    return;
  }

  setCargando(true);

  const { error } = await sb.auth.signInWithPassword({ email, password: pass });

  if (error) {
    setCargando(false);
    if ((error.message || '').toLowerCase().includes('email not confirmed')) {
      mostrarError('Tu correo aún no está confirmado. Busca el email de confirmación (mira también en spam) y pincha el enlace.');
    } else {
      mostrarError('Correo o contraseña incorrectos.');
    }
    return;
  }

  await redirigirSegunRol();
});

// ==== Registro (primera vez) ====
regPass2El.addEventListener('keypress', e => {
  if (e.key === 'Enter') btnRegistro.click();
});

btnRegistro.addEventListener('click', async () => {
  ocultarError();
  const email = regEmailEl.value.trim().toLowerCase();
  const pass  = regPassEl.value;
  const pass2 = regPass2El.value;

  if (!email || !email.includes('@')) {
    mostrarError('Introduce un correo válido.');
    return;
  }
  if (pass.length < 8) {
    mostrarError('La contraseña debe tener al menos 8 caracteres.');
    return;
  }
  if (pass !== pass2) {
    mostrarError('Las dos contraseñas no coinciden.');
    return;
  }

  setCargando(true);

  const { data, error } = await sb.auth.signUp({
    email,
    password: pass,
    options: {
      emailRedirectTo: 'https://canostboi.github.io/fichaje-obras-bp-recop/'
    }
  });

  setCargando(false);

  if (error) {
    mostrarError('No se pudo crear la cuenta: ' + error.message);
    return;
  }

  // Si el correo ya tenía cuenta confirmada, Supabase devuelve un usuario
  // sin identities (por seguridad no da error). Lo detectamos y avisamos.
  if (data && data.user && Array.isArray(data.user.identities) && data.user.identities.length === 0) {
    mostrarError('Este correo ya tiene cuenta. Vuelve a "Entrar" e inicia sesión. Si no recuerdas la contraseña, avisa al administrador.');
    return;
  }

  vistaRegistro.style.display = 'none';
  vistaLogin.style.display = 'block';
  mostrarOk('✅ Cuenta creada. Te hemos enviado un correo de confirmación a ' + email + '. Pincha el enlace del email (mira también en spam) y después entra aquí con tu correo y contraseña.');
});

async function redirigirSegunRol() {
  // La RPC busca por auth_user_id (flujo normal) o por email con auth_user_id NULL
  // (primer login). En este segundo caso también hace el UPDATE de vinculación.
  const { data: rol, error } = await sb.rpc('vincular_y_obtener_rol');

  if (error || !rol) {
    await sb.auth.signOut();
    mostrarError('Tu usuario no tiene acceso configurado. Contacta con el administrador.');
    setCargando(false);
    return;
  }

  switch (rol) {
    case 'admin':
      window.location.href = 'admin/';
      break;
    case 'jefe_obra':
      window.location.href = 'jefe/';
      break;
    case 'encargado':
      window.location.href = 'encargado/';
      break;
    default:
      await sb.auth.signOut();
      mostrarError('Rol no reconocido. Contacta con el administrador.');
      setCargando(false);
  }
}
</script>
</body>
</html>

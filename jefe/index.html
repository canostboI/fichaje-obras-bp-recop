<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jefe de Obra — Fichaje Obras</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --verde: #4caf50; --naranja: #ff9800; --rojo: #f44336; --azul: #2196f3;
    --bg: #111318; --bg2: #1a1d24; --bg3: #22262f; --borde: #2e3340;
    --texto: #e8eaf0; --texto2: #8b909e; --sidebar-w: 200px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--texto); min-height: 100vh; display: flex; }
  .sidebar { width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--borde); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; }
  .sidebar-logo { padding: 22px 20px 18px; font-size: 13px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--naranja); border-bottom: 1px solid var(--borde); }
  .sidebar-section { padding: 18px 14px 6px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--texto2); }
  .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 14px; color: var(--texto2); text-decoration: none; border-radius: 8px; margin: 2px 8px; transition: background 0.15s, color 0.15s; }
  .sidebar a:hover { background: var(--bg3); color: var(--texto); }
  .sidebar a.activo { background: var(--bg3); color: var(--texto); font-weight: 600; }
  .sidebar a .ico { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-bottom { margin-top: auto; padding: 16px; border-top: 1px solid var(--borde); }
  .btn-salir { width: 100%; background: transparent; border: 1px solid var(--borde); color: var(--texto2); padding: 9px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; text-align: left; display: flex; align-items: center; gap: 8px; }
  .btn-salir:hover { background: var(--bg3); color: var(--texto); }
  .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
  .topbar { padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .topbar h1 { font-size: 22px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .usuario { font-size: 13px; color: var(--texto2); }
  .selector-obra { background: var(--bg2); border: 1px solid var(--borde); border-radius: 8px; color: var(--texto); font-size: 14px; padding: 8px 12px; font-family: inherit; }
  .selector-obra:focus { outline: none; border-color: var(--naranja); }
  .btn-qr { background: var(--bg2); border: 1px solid var(--borde); color: var(--texto); font-size: 13px; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
  .btn-qr:hover { background: var(--bg3); }
  .contenido { padding: 24px 28px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .stat { background: var(--bg2); border: 1px solid var(--borde); border-radius: 10px; padding: 20px 22px; }
  .stat .numero { font-size: 38px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
  .stat .etiqueta { font-size: 13px; color: var(--texto2); }
  .stat .numero.verde   { color: var(--verde); }
  .stat .numero.naranja { color: var(--naranja); }
  .stat .numero.rojo    { color: var(--rojo); }
  .seccion { background: var(--bg2); border: 1px solid var(--borde); border-radius: 10px; overflow: hidden; }
  .seccion-cab { padding: 14px 20px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; justify-content: space-between; }
  .seccion-cab h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .badge.verde { background: rgba(76,175,80,0.15); color: var(--verde); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 10px 20px; font-size: 11px; font-weight: 700; color: var(--texto2); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--borde); }
  td { padding: 13px 20px; border-bottom: 1px solid var(--borde); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .pill.verde   { background: rgba(76,175,80,0.15);  color: var(--verde); }
  .pill.naranja { background: rgba(255,152,0,0.15);  color: var(--naranja); }
  .pill.rojo    { background: rgba(244,67,54,0.15);  color: var(--rojo); }
  .vacio { padding: 28px 20px; text-align: center; color: var(--texto2); font-size: 14px; }
  .cargando { padding: 28px 20px; text-align: center; color: var(--texto2); font-size: 14px; }

  /* Modal QR */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.visible { display: flex; }
  .modal-qr { background: white; color: #111; border-radius: 14px; padding: 32px; max-width: 380px; width: 90%; text-align: center; }
  .modal-qr h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .modal-qr p { font-size: 13px; color: #666; margin-bottom: 20px; }
  .modal-qr canvas { display: block; margin: 0 auto 20px; }
  .modal-qr-btns { display: flex; gap: 10px; justify-content: center; }
  .btn-imprimir { background: #111318; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
  .btn-cerrar-modal { background: #f1f5f9; color: #333; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">Jefe de Obra</div>
  <div class="sidebar-section">Principal</div>
  <a href="index.html" class="activo"><span class="ico">👷</span> Presencia</a>
  <div class="sidebar-section">Gestión</div>
  <a href="fichajes.html"><span class="ico">🕐</span> Fichajes</a>
  <a href="documentos.html"><span class="ico">📄</span> Documentos</a>
  <a href="trabajadores.html"><span class="ico">👥</span> Trabajadores</a>
  <a href="documentos-ecoordina.html"><span class="ico">📥</span> e-Coordina</a>
  <div class="sidebar-bottom">
    <button class="btn-salir" id="btn-salir">↩ Cerrar sesión</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1>Presencia</h1>
    <div class="topbar-right">
      <button class="btn-qr" id="btn-ver-qr">📱 Ver QR</button>
      <select class="selector-obra" id="selector-obra">
        <option value="">Cargando obras…</option>
      </select>
      <span class="usuario" id="usuario-nombre"></span>
    </div>
  </div>
  <div class="contenido">
    <div class="stats">
      <div class="stat"><div class="numero verde" id="stat-dentro">—</div><div class="etiqueta">En obra ahora</div></div>
      <div class="stat"><div class="numero naranja" id="stat-naranja">—</div><div class="etiqueta">Documentación naranja</div></div>
      <div class="stat"><div class="numero rojo" id="stat-rojo">—</div><div class="etiqueta">Documentación roja</div></div>
    </div>
    <div style="height:20px"></div>
    <div class="seccion">
      <div class="seccion-cab">
        <h2>Trabajadores en obra ahora</h2>
        <span class="badge verde" id="badge-presencia">—</span>
      </div>
      <div id="tabla-presencia"><div class="cargando">Selecciona una obra…</div></div>
    </div>
  </div>
</div>

<!-- Modal QR -->
<div class="modal-overlay" id="modal-qr">
  <div class="modal-qr">
    <h3 id="qr-obra-nombre">Obra</h3>
    <p>Escanea este código para fichar</p>
    <div id="qr-canvas"></div>
    <div class="modal-qr-btns">
      <button class="btn-imprimir" onclick="imprimirQR()">🖨️ Imprimir</button>
      <button class="btn-cerrar-modal" onclick="cerrarQR()">Cerrar</button>
    </div>
  </div>
</div>

<script src="../js/supabase-client.js"></script>
<script>
const sb = window.supabaseClient;

(async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '../'; return; }

  const { data: miUsuario } = await sb
    .from('usuarios_app')
    .select('id, nombre')
    .eq('auth_user_id', session.user.id)
    .single();

  if (!miUsuario) { window.location.href = '../'; return; }

  document.getElementById('usuario-nombre').textContent = miUsuario.nombre || session.user.email;

  const { data: misObras, error } = await sb
    .from('usuarios_obra')
    .select('obra_id, rol_en_obra, obra:obra_id(id, nombre)')
    .eq('usuario_app_id', miUsuario.id)
    .eq('rol_en_obra', 'jefe_obra');

  if (error || !misObras || misObras.length === 0) {
    window.location.href = '../';
    return;
  }

  const selector = document.getElementById('selector-obra');
  selector.innerHTML = '';
  misObras.forEach(uo => {
    const opt = document.createElement('option');
    opt.value = uo.obra.id;
    opt.textContent = uo.obra.nombre;
    selector.appendChild(opt);
  });

  obraActual = misObras[0].obra.id;
  await cargarPresencia();

  selector.addEventListener('change', async () => {
    obraActual = selector.value;
    await cargarPresencia();
  });
})();

document.getElementById('btn-salir').addEventListener('click', async () => {
  await sb.auth.signOut(); window.location.href = '../';
});

document.getElementById('btn-ver-qr').addEventListener('click', () => {
  if (!obraActual) return;
  const obraNombre = document.getElementById('selector-obra').options[document.getElementById('selector-obra').selectedIndex]?.text || 'Obra';
  abrirQR(obraActual, obraNombre);
});

let obraActual = null;

async function cargarPresencia() {
  document.getElementById('tabla-presencia').innerHTML = '<div class="cargando">Cargando…</div>';
  const hoy = new Date().toISOString().split('T')[0];

  const { data: fichajes } = await sb
    .from('fichajes')
    .select('id, tipo, hora, trabajador_id, trabajador:trabajador_id(id, nombre, apellidos, dni)')
    .eq('obra_id', obraActual)
    .gte('hora', hoy + 'T00:00:00')
    .lte('hora', hoy + 'T23:59:59')
    .order('hora', { ascending: true });

  if (!fichajes || fichajes.length === 0) {
    document.getElementById('stat-dentro').textContent = '0';
    document.getElementById('stat-naranja').textContent = '0';
    document.getElementById('stat-rojo').textContent = '0';
    document.getElementById('badge-presencia').textContent = '0 dentro';
    document.getElementById('tabla-presencia').innerHTML = '<div class="vacio">Nadie ha fichado entrada hoy</div>';
    return;
  }

  const porTrabajador = {};
  fichajes.forEach(f => {
    if (!porTrabajador[f.trabajador_id]) {
      porTrabajador[f.trabajador_id] = { trabajador: f.trabajador, entradas: [], salidas: [] };
    }
    if (f.tipo === 'entrada') porTrabajador[f.trabajador_id].entradas.push(f);
    else porTrabajador[f.trabajador_id].salidas.push(f);
  });

  const dentro = Object.values(porTrabajador).filter(t => t.entradas.length > t.salidas.length);

  const ids = dentro.map(t => t.trabajador.id);
  let validaciones = {};
  if (ids.length > 0) {
    const { data: vals } = await sb
      .from('validaciones_obra')
      .select('trabajador_id, estado')
      .eq('obra_id', obraActual)
      .in('trabajador_id', ids);
    (vals || []).forEach(v => { validaciones[v.trabajador_id] = v.estado; });
  }

  const nDentro = dentro.length;
  const nNaranja = dentro.filter(t => validaciones[t.trabajador.id] === 'naranja').length;
  const nRojo = dentro.filter(t => validaciones[t.trabajador.id] === 'rojo').length;

  document.getElementById('stat-dentro').textContent = nDentro;
  document.getElementById('stat-naranja').textContent = nNaranja;
  document.getElementById('stat-rojo').textContent = nRojo;
  document.getElementById('badge-presencia').textContent = nDentro + ' dentro';

  if (dentro.length === 0) {
    document.getElementById('tabla-presencia').innerHTML = '<div class="vacio">Nadie está en obra ahora mismo</div>';
    return;
  }

  document.getElementById('tabla-presencia').innerHTML = `
    <table>
      <thead><tr>
        <th>Trabajador</th><th>DNI</th><th>Entrada</th><th>Doc.</th>
      </tr></thead>
      <tbody>
        ${dentro.map(t => {
          const ultimaEntrada = t.entradas[t.entradas.length - 1];
          const estado = validaciones[t.trabajador.id] || 'verde';
          return `<tr>
            <td><strong>${esc(t.trabajador.nombre)} ${esc(t.trabajador.apellidos)}</strong></td>
            <td>${esc(t.trabajador.dni)}</td>
            <td>${formatHora(ultimaEntrada.hora)}</td>
            <td><span class="pill ${estado}">${estado}</span></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

// ── QR ────────────────────────────────────────────────────────────────────────
function abrirQR(obraId, obraNombre) {
  const url = `https://canostboi.github.io/fichaje-obras-bp-recop/fichaje/?obra=${obraId}`;
  document.getElementById('qr-obra-nombre').textContent = obraNombre;
  const canvas = document.getElementById('qr-canvas');
canvas.innerHTML = '';
new QRCode(canvas, { text: url, width: 280, height: 280 });
  document.getElementById('modal-qr').classList.add('visible');
}

function cerrarQR() {
  document.getElementById('modal-qr').classList.remove('visible');
}

function imprimirQR() {
  const canvas = document.getElementById('qr-canvas');
  const obraNombre = document.getElementById('qr-obra-nombre').textContent;
  const dataUrl = canvas.toDataURL('image/png');
  const win = window.open('', '_blank');
  win.document.write(`
    <!DOCTYPE html><html><head>
    <title>QR — ${obraNombre}</title>
    <style>
      body { font-family: sans-serif; text-align: center; padding: 40px; }
      h1 { font-size: 24px; margin-bottom: 8px; }
      p { color: #666; font-size: 14px; margin-bottom: 24px; }
      img { display: block; margin: 0 auto; width: 280px; }
    </style>
    </head><body>
    <h1>${obraNombre}</h1>
    <p>Escanea este código QR para fichar tu entrada/salida</p>
    <img src="${dataUrl}" />
    <script>window.onload = () => { window.print(); }<\/script>
    </body></html>`);
  win.document.close();
}

// Cerrar modal al hacer clic fuera
document.getElementById('modal-qr').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-qr')) cerrarQR();
});

function esc(txt) {
  const d = document.createElement('div');
  d.textContent = String(txt || '');
  return d.innerHTML;
}

function formatHora(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}
</script>
</body>
</html>

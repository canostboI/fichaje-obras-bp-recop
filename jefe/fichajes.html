<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fichajes — Jefe de Obra</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="../js/branding.js"></script>
<script src="../js/excel-proforma.js"></script>
<style>
  :root {
    --verde: #4caf50; --naranja: #ff9800; --rojo: #f44336; --azul: #2196f3;
    --bg: #111318; --bg2: #1a1d24; --bg3: #22262f; --borde: #2e3340;
    --texto: #e8eaf0; --texto2: #8b909e; --sidebar-w: 200px;
    --color-acento: #ff9800;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--texto); min-height: 100vh; display: flex; }
  .sidebar { width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--borde); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; }
  .sidebar-brand { padding: 18px 16px 14px; border-bottom: 1px solid var(--borde); }
  .sidebar-brand img { max-width: 100%; max-height: 42px; display: none; object-fit: contain; }
  .sidebar-logo { padding: 10px 20px 14px; font-size: 13px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--color-acento); }
  .sidebar-section { padding: 18px 14px 6px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--texto2); }
  .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 14px; color: var(--texto2); text-decoration: none; border-radius: 8px; margin: 2px 8px; transition: background 0.15s, color 0.15s; }
  .sidebar a:hover { background: var(--bg3); color: var(--texto); }
  .sidebar a.activo { background: var(--bg3); color: var(--texto); font-weight: 600; }
  .sidebar a .ico { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-bottom { margin-top: auto; padding: 16px; border-top: 1px solid var(--borde); }
  .btn-salir { width: 100%; background: transparent; border: 1px solid var(--borde); color: var(--texto2); padding: 9px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; text-align: left; display: flex; align-items: center; gap: 8px; }
  .btn-salir:hover { background: var(--bg3); color: var(--texto); }
  .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
  .topbar { padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .topbar h1 { font-size: 22px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .usuario { font-size: 13px; color: var(--texto2); }
  .selector-obra { background: var(--bg2); border: 1px solid var(--borde); border-radius: 8px; color: var(--texto); font-size: 14px; padding: 8px 12px; font-family: inherit; }
  .selector-obra:focus { outline: none; border-color: var(--color-acento); }
  .contenido { padding: 0 28px 28px; }
  .barra-filtros { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .barra-filtros input { background: var(--bg2); border: 1px solid var(--borde); border-radius: 8px; color: var(--texto); font-size: 14px; padding: 9px 14px; font-family: inherit; width: 160px; color-scheme: dark; }
  .barra-filtros input:focus { outline: none; border-color: var(--color-acento); }
  .btn-secundario { background: transparent; color: var(--texto2); border: 1px solid var(--borde); padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-secundario:hover { background: var(--bg3); color: var(--texto); }
  .btn-manual { background: var(--color-acento); color: white; border: none; padding: 9px 15px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-manual:hover { opacity: 0.9; }
  .btn-naranja { background: var(--naranja); color: white; border: none; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-naranja:hover { opacity: 0.9; }

  /* === Bloque de exportación mensual (segunda barra) === */
  .bloque-export { background: var(--bg2); border: 1px solid var(--borde); border-radius: 10px; padding: 14px 20px; margin-bottom: 16px; }
  .bloque-export-titulo { font-size: 11px; font-weight: 700; color: var(--texto2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
  .bloque-export-fila { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .bloque-export-fila input[type="month"] { background: var(--bg3); border: 1px solid var(--borde); border-radius: 8px; color: var(--texto); font-size: 14px; padding: 9px 14px; font-family: inherit; width: 160px; color-scheme: dark; }
  .bloque-export-fila input[type="month"]:focus { outline: none; border-color: var(--color-acento); }
  .btn-exportar { background: var(--verde); color: white; border: none; padding: 9px 15px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-exportar:hover { opacity: 0.9; }
  .btn-exportar:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg-export { font-size: 12px; color: var(--texto2); }
  .msg-export.err { color: var(--rojo); }
  .msg-export.ok { color: var(--verde); }

  .seccion { background: var(--bg2); border: 1px solid var(--borde); border-radius: 10px; overflow: hidden; }
  .seccion-cab { padding: 14px 20px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; justify-content: space-between; }
  .seccion-cab h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: rgba(33,150,243,0.15); color: var(--azul); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 10px 20px; font-size: 11px; font-weight: 700; color: var(--texto2); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--borde); }
  td { padding: 13px 20px; border-bottom: 1px solid var(--borde); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .pill.verde  { background: rgba(76,175,80,0.15);  color: var(--verde); }
  .pill.azul   { background: rgba(33,150,243,0.15); color: var(--azul); }
  .pill.naranja{ background: rgba(255,152,0,0.15);  color: var(--naranja); }
  .vacio { padding: 28px 20px; text-align: center; color: var(--texto2); font-size: 14px; }
  .cargando { padding: 28px 20px; text-align: center; color: var(--texto2); font-size: 14px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.visible { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--borde); border-radius: 14px; padding: 28px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .modal .subtitulo { font-size: 13px; color: var(--texto2); margin-bottom: 22px; }
  .campo { margin-bottom: 16px; }
  .campo label { display: block; font-size: 12px; font-weight: 600; color: var(--texto2); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
  .campo input, .campo textarea, .campo select { width: 100%; background: var(--bg3); border: 1px solid var(--borde); border-radius: 8px; color: var(--texto); font-size: 14px; padding: 10px 12px; font-family: inherit; }
  .campo input[type="date"], .campo input[type="time"] { color-scheme: dark; }
  .campo textarea { resize: vertical; min-height: 70px; }
  .campo input:focus, .campo textarea:focus, .campo select:focus { outline: none; border-color: var(--color-acento); }
  .campo-fila { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-acciones { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .btn-primario { background: var(--naranja); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-primario:disabled { opacity: 0.45; cursor: not-allowed; }
  .error-modal { background: rgba(244,67,54,0.1); color: var(--rojo); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none; }
  .ok-modal { background: rgba(76,175,80,0.1); color: var(--verde); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <img id="sidebar-logo" alt="">
  </div>
  <div class="sidebar-logo">Jefe de Obra</div>
  <div class="sidebar-section">Principal</div>
  <a href="index.html"><span class="ico">👷</span> Presencia</a>
  <div class="sidebar-section">Gestión</div>
  <a href="fichajes.html" class="activo"><span class="ico">🕐</span> Fichajes</a>
  <a href="trabajadores.html"><span class="ico">👥</span> Trabajadores</a>
  <a href="documentos-ecoordina.html"><span class="ico">📥</span> e-Coordina</a>
  <div class="sidebar-bottom">
    <button class="btn-salir" id="btn-salir">↩ Cerrar sesión</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1>Fichajes</h1>
    <div class="topbar-right">
      <select class="selector-obra" id="selector-obra"></select>
      <span class="usuario" id="usuario-nombre"></span>
    </div>
  </div>

  <div class="contenido">
    <div class="barra-filtros">
      <input type="date" id="filtro-fecha">
      <button class="btn-secundario" id="btn-hoy">Hoy</button>
      <button class="btn-secundario" id="btn-buscar">Buscar</button>
      <button class="btn-manual" id="btn-manual">+ Fichar por trabajador</button>
    </div>

    <div class="bloque-export">
      <div class="bloque-export-titulo">Exportación mensual</div>
      <div class="bloque-export-fila">
        <input type="month" id="filtro-mes">
        <button class="btn-exportar" id="btn-exportar">Exportar Excel</button>
        <span class="msg-export" id="msg-export"></span>
      </div>
    </div>

    <div class="seccion">
      <div class="seccion-cab">
        <h2>Historial de fichajes</h2>
        <span class="badge" id="badge-total">—</span>
      </div>
      <div id="tabla-fichajes"><div class="cargando">Cargando…</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-correccion">
  <div class="modal">
    <h2>Corregir fichaje</h2>
    <div class="subtitulo" id="correccion-subtitulo"></div>
    <div class="error-modal" id="error-correccion"></div>
    <div class="ok-modal" id="ok-correccion"></div>

    <div class="campo">
      <label>Nueva hora</label>
      <input type="time" id="f-hora">
    </div>

    <div class="campo">
      <label>Motivo</label>
      <textarea id="f-motivo" placeholder="Ej: El trabajador olvidó fichar la salida"></textarea>
    </div>

    <div class="modal-acciones">
      <button class="btn-secundario" id="btn-cancelar">Cancelar</button>
      <button class="btn-primario" id="btn-guardar">Guardar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-manual">
  <div class="modal">
    <h2>Fichar por trabajador</h2>
    <div class="subtitulo">Registra una entrada o salida manual cuando el trabajador no pueda fichar desde su móvil.</div>
    <div class="error-modal" id="error-manual"></div>
    <div class="ok-modal" id="ok-manual"></div>

    <div class="campo">
      <label>Trabajador</label>
      <select id="manual-trabajador">
        <option value="">Cargando trabajadores…</option>
      </select>
    </div>

    <div class="campo">
      <label>Tipo de fichaje</label>
      <select id="manual-tipo">
        <option value="entrada">Entrada</option>
        <option value="salida">Salida</option>
      </select>
    </div>

    <div class="campo-fila">
      <div class="campo">
        <label>Fecha</label>
        <input type="date" id="manual-fecha">
      </div>
      <div class="campo">
        <label>Hora</label>
        <input type="time" id="manual-hora">
      </div>
    </div>

    <div class="campo">
      <label>Motivo</label>
      <textarea id="manual-motivo" placeholder="Ej: trabajador sin móvil / móvil sin batería / problema puntual con QR"></textarea>
    </div>

    <div class="modal-acciones">
      <button class="btn-secundario" id="btn-cancelar-manual">Cancelar</button>
      <button class="btn-primario" id="btn-guardar-manual">Registrar fichaje</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://istrnsicleopzbsrapsw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzdHJuc2ljbGVvcHpic3JhcHN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTIxMTYsImV4cCI6MjA5MTM4ODExNn0.5UXV2LWPXmbfLI7rKpZSG9YBzZsesjckHnhQabA0mTY';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let obraActual = null;
let brandingActual = null;
let fichajeCorrigiendoId = null;
let fichajeCorrigiendoHora = null;
let trabajadoresObra = [];
let miUsuarioAppId = null;

(async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '../'; return; }

  const { data: miUsuario } = await sb
    .from('usuarios_app')
    .select('id, nombre')
    .eq('auth_user_id', session.user.id)
    .single();

  if (!miUsuario) { window.location.href = '../'; return; }
  miUsuarioAppId = miUsuario.id;
  document.getElementById('usuario-nombre').textContent = miUsuario.nombre || session.user.email;

  const { data: misObras } = await sb
    .from('usuarios_obra')
    .select('obra_id, obra:obra_id(id, nombre, empresa_marca)')
    .eq('usuario_app_id', miUsuario.id)
    .eq('rol_en_obra', 'jefe_obra');

  if (!misObras || misObras.length === 0) { window.location.href = '../'; return; }

  const selector = document.getElementById('selector-obra');
  misObras.forEach(uo => {
    const opt = document.createElement('option');
    opt.value = uo.obra.id;
    opt.textContent = uo.obra.nombre;
    opt.dataset.marca = uo.obra.empresa_marca || 'bosch_pascual';
    selector.appendChild(opt);
  });

  obraActual = misObras[0].obra.id;
  aplicarBrandingObra(misObras[0].obra.empresa_marca);
  document.getElementById('filtro-fecha').value = fechaHoy();
  document.getElementById('filtro-mes').value = mesActual();
  await cargarTrabajadoresObra();
  await buscar();

  selector.addEventListener('change', async () => {
    obraActual = selector.value;
    const marca = selector.options[selector.selectedIndex].dataset.marca;
    aplicarBrandingObra(marca);
    // Limpiar mensaje de export al cambiar de obra
    const msg = document.getElementById('msg-export');
    msg.className = 'msg-export';
    msg.textContent = '';
    await cargarTrabajadoresObra();
    await buscar();
  });
})();

function aplicarBrandingObra(empresaMarca) {
  const marca = empresaMarca || 'bosch_pascual';
  brandingActual = aplicarBranding(marca);
  const logoImg = document.getElementById('sidebar-logo');
  logoImg.src = '../' + brandingActual.logo_blanco;
  logoImg.alt = brandingActual.nombre;
  logoImg.style.display = 'block';
}

document.getElementById('btn-salir').addEventListener('click', async () => {
  await sb.auth.signOut();
  window.location.href = '../';
});

document.getElementById('btn-hoy').addEventListener('click', () => {
  document.getElementById('filtro-fecha').value = fechaHoy();
  buscar();
});

document.getElementById('btn-buscar').addEventListener('click', buscar);
document.getElementById('btn-exportar').addEventListener('click', exportarExcelMensual);

async function buscar() {
  document.getElementById('tabla-fichajes').innerHTML = '<div class="cargando">Cargando…</div>';
  const fecha = document.getElementById('filtro-fecha').value;

  let query = sb
    .from('fichajes')
    .select('id, tipo, hora, es_manual, cierre_automatico, corregido_por, trabajador:trabajador_id(nombre, apellidos, dni)')
    .eq('obra_id', obraActual)
    .order('hora', { ascending: false })
    .limit(200);

  if (fecha) {
    const [y, m, d] = fecha.split('-').map(Number);
    const desde = new Date(y, m - 1, d, 0, 0, 0, 0);
    const hasta = new Date(y, m - 1, d, 23, 59, 59, 999);
    query = query.gte('hora', desde.toISOString()).lte('hora', hasta.toISOString());
  }

  const { data, error } = await query;

  if (error || !data || data.length === 0) {
    document.getElementById('badge-total').textContent = '0 registros';
    document.getElementById('tabla-fichajes').innerHTML = '<div class="vacio">No hay fichajes para esta fecha</div>';
    return;
  }

  document.getElementById('badge-total').textContent = data.length + ' registros';
  document.getElementById('tabla-fichajes').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Trabajador</th>
          <th>DNI</th>
          <th>Tipo</th>
          <th>Hora</th>
          <th>Avisos</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(f => {
          const avisos = [];
          if (f.cierre_automatico) avisos.push('⏰ Autocierre');
          if (f.es_manual) avisos.push('✍️ Manual');
          if (f.corregido_por) avisos.push('🛠️ Corregido');
          return `<tr>
            <td><strong>${esc(f.trabajador?.nombre)} ${esc(f.trabajador?.apellidos)}</strong></td>
            <td>${esc(f.trabajador?.dni)}</td>
            <td><span class="pill ${f.tipo === 'entrada' ? 'verde' : 'azul'}">${esc(f.tipo)}</span></td>
            <td>${formatFechaHora(f.hora)}</td>
            <td>${avisos.join(' ') || '—'}</td>
            <td><button class="btn-naranja" onclick="abrirCorreccion('${f.id}', '${esc(f.trabajador?.nombre)} ${esc(f.trabajador?.apellidos)}', '${f.hora}')">Corregir</button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

async function cargarTrabajadoresObra() {
  const { data, error } = await sb
    .from('validaciones_obra')
    .select('estado, trabajador:trabajador_id(id, nombre, apellidos, dni, activo)')
    .eq('obra_id', obraActual);

  if (error || !data) {
    trabajadoresObra = [];
    return;
  }

  const mapa = new Map();

  data.forEach(v => {
    const t = v.trabajador;
    if (!t || !t.id || t.activo === false) return;
    if (!mapa.has(t.id)) {
      mapa.set(t.id, {
        id: t.id,
        nombre: t.nombre || '',
        apellidos: t.apellidos || '',
        dni: t.dni || '',
        estado: v.estado || 'verde'
      });
    }
  });

  trabajadoresObra = [...mapa.values()].sort((a, b) =>
    (`${a.apellidos} ${a.nombre}`).localeCompare(`${b.apellidos} ${b.nombre}`, 'es')
  );
}

document.getElementById('btn-manual').addEventListener('click', async () => {
  await cargarTrabajadoresObra();

  document.getElementById('error-manual').style.display = 'none';
  document.getElementById('ok-manual').style.display = 'none';
  document.getElementById('manual-fecha').value = document.getElementById('filtro-fecha').value || fechaHoy();
  document.getElementById('manual-hora').value = horaAhora();
  document.getElementById('manual-tipo').value = 'entrada';
  document.getElementById('manual-motivo').value = '';
  document.getElementById('btn-guardar-manual').disabled = false;

  rellenarSelectTrabajadoresManual();
  document.getElementById('modal-manual').classList.add('visible');
});

function rellenarSelectTrabajadoresManual() {
  const select = document.getElementById('manual-trabajador');
  select.innerHTML = '<option value="">Selecciona trabajador…</option>';

  trabajadoresObra.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = `${t.apellidos ? t.apellidos + ', ' : ''}${t.nombre} — ${t.dni} (${t.estado})`;
    select.appendChild(opt);
  });

  if (trabajadoresObra.length === 0) {
    select.innerHTML = '<option value="">No hay trabajadores asociados a esta obra</option>';
  }
}

document.getElementById('btn-cancelar-manual').addEventListener('click', () => {
  document.getElementById('modal-manual').classList.remove('visible');
});

document.getElementById('btn-guardar-manual').addEventListener('click', async () => {
  const trabajadorId = document.getElementById('manual-trabajador').value;
  const tipo = document.getElementById('manual-tipo').value;
  const fecha = document.getElementById('manual-fecha').value;
  const hora = document.getElementById('manual-hora').value;
  const motivo = document.getElementById('manual-motivo').value.trim();

  if (!trabajadorId) { mostrarErrorManual('Selecciona un trabajador.'); return; }
  if (!tipo) { mostrarErrorManual('Selecciona entrada o salida.'); return; }
  if (!fecha) { mostrarErrorManual('La fecha es obligatoria.'); return; }
  if (!hora) { mostrarErrorManual('La hora es obligatoria.'); return; }
  if (!motivo) { mostrarErrorManual('El motivo es obligatorio.'); return; }

  const horaLocal = new Date(`${fecha}T${hora}:00`);

  if (isNaN(horaLocal.getTime())) {
    mostrarErrorManual('La fecha u hora no son válidas.');
    return;
  }

  document.getElementById('btn-guardar-manual').disabled = true;

  const { data, error } = await sb.rpc('registrar_fichaje_manual', {
    p_trabajador_id: trabajadorId,
    p_obra_id: obraActual,
    p_tipo: tipo,
    p_hora: horaLocal.toISOString(),
    p_motivo: motivo
  });

  if (error) {
    document.getElementById('btn-guardar-manual').disabled = false;
    mostrarErrorManual('Error al registrar: ' + error.message);
    return;
  }

  if (!data || data.success !== true) {
    document.getElementById('btn-guardar-manual').disabled = false;
    mostrarErrorManual((data && data.error) ? data.error : 'No se ha podido registrar el fichaje.');
    return;
  }

  document.getElementById('ok-manual').textContent = 'Fichaje manual registrado correctamente.';
  document.getElementById('ok-manual').style.display = 'block';
  document.getElementById('error-manual').style.display = 'none';

  document.getElementById('filtro-fecha').value = fecha;

  setTimeout(async () => {
    document.getElementById('modal-manual').classList.remove('visible');
    await buscar();
  }, 900);
});

function abrirCorreccion(id, nombre, hora) {
  fichajeCorrigiendoId = id;
  fichajeCorrigiendoHora = hora;
  document.getElementById('correccion-subtitulo').textContent = nombre;
  // Mostrar la hora original en hora LOCAL del navegador (no del ISO crudo)
  const d = new Date(hora);
  const hh = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  document.getElementById('f-hora').value = isNaN(d.getTime()) ? '' : `${hh}:${mi}`;
  document.getElementById('f-motivo').value = '';
  document.getElementById('error-correccion').style.display = 'none';
  document.getElementById('ok-correccion').style.display = 'none';
  document.getElementById('btn-guardar').disabled = false;
  document.getElementById('modal-correccion').classList.add('visible');
}

document.getElementById('btn-cancelar').addEventListener('click', () => {
  document.getElementById('modal-correccion').classList.remove('visible');
});

document.getElementById('btn-guardar').addEventListener('click', async () => {
  const nuevaHora = document.getElementById('f-hora').value;
  const motivo = document.getElementById('f-motivo').value.trim();

  if (!nuevaHora) { mostrarError('La hora es obligatoria.'); return; }
  if (!motivo) { mostrarError('El motivo es obligatorio.'); return; }

  if (!miUsuarioAppId) {
    mostrarError('No se ha podido identificar al usuario.');
    return;
  }

  // Construir la nueva hora respetando zona horaria local del navegador
  // La fecha base se toma del fichaje original (en hora local del navegador)
  const dOriginal = new Date(fichajeCorrigiendoHora);
  if (isNaN(dOriginal.getTime())) {
    mostrarError('La fecha original del fichaje no es válida.');
    return;
  }
  const yy = dOriginal.getFullYear();
  const mm = dOriginal.getMonth();
  const dd = dOriginal.getDate();
  const [hh, mi] = nuevaHora.split(':').map(Number);
  const horaLocal = new Date(yy, mm, dd, hh, mi, 0, 0);

  if (isNaN(horaLocal.getTime())) {
    mostrarError('La hora no es válida.');
    return;
  }

  document.getElementById('btn-guardar').disabled = true;

  const { error } = await sb
    .from('fichajes')
    .update({
      hora: horaLocal.toISOString(),
      motivo_correccion: motivo,
      corregido_por: miUsuarioAppId,
      corregido_en: new Date().toISOString()
    })
    .eq('id', fichajeCorrigiendoId);

  if (error) {
    document.getElementById('btn-guardar').disabled = false;
    mostrarError('Error al guardar: ' + error.message);
    return;
  }

  document.getElementById('ok-correccion').textContent = 'Corrección guardada.';
  document.getElementById('ok-correccion').style.display = 'block';

  setTimeout(async () => {
    document.getElementById('modal-correccion').classList.remove('visible');
    await buscar();
  }, 1200);
});

// =====================================================================
// EXPORTACIÓN EXCEL MENSUAL
// =====================================================================
// El generador del Excel vive en js/excel-proforma.js (window.ExcelProforma).
// Aquí solo:
//   1) validamos formulario,
//   2) consultamos los datos a Supabase con permisos de jefe (RLS aplica),
//   3) llamamos al módulo,
//   4) descargamos el archivo.
// =====================================================================

async function exportarExcelMensual() {
  const msg = document.getElementById('msg-export');
  const btn = document.getElementById('btn-exportar');

  msg.className = 'msg-export';
  msg.textContent = '';

  const obraId = obraActual;
  const mes = document.getElementById('filtro-mes').value;

  if (!obraId) {
    msg.className = 'msg-export err';
    msg.textContent = 'No hay obra seleccionada.';
    return;
  }

  if (!mes) {
    msg.className = 'msg-export err';
    msg.textContent = 'Selecciona un mes.';
    return;
  }

  if (!window.ExcelJS) {
    msg.className = 'msg-export err';
    msg.textContent = 'No se ha cargado ExcelJS. Recarga la página.';
    return;
  }

  if (!window.ExcelProforma) {
    msg.className = 'msg-export err';
    msg.textContent = 'No se ha cargado js/excel-proforma.js. Recarga la página.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Exportando…';
  msg.textContent = 'Preparando Excel…';

  try {
    const obra = await obtenerObra(obraId);
    const fichajes = await obtenerFichajesMes(obraId, mes);

    if (!fichajes || fichajes.length === 0) {
      msg.className = 'msg-export err';
      msg.textContent = 'No hay fichajes en ese mes para esa obra.';
      btn.disabled = false;
      btn.textContent = 'Exportar Excel';
      return;
    }

    const buffer = await window.ExcelProforma.generar({ obra, mes, fichajes });
    const nombreArchivo = `control_personal_${limpiarNombreArchivo(obra?.nombre || 'obra')}_${mes}.xlsx`;
    descargarBuffer(buffer, nombreArchivo);

    msg.className = 'msg-export ok';
    msg.textContent = 'Excel generado.';
  } catch (err) {
    console.error(err);
    msg.className = 'msg-export err';
    msg.textContent = 'Error al exportar: ' + (err.message || err);
  }

  btn.disabled = false;
  btn.textContent = 'Exportar Excel';
}

async function obtenerObra(obraId) {
  const { data, error } = await sb
    .from('obras')
    .select('id, nombre, numero_obra')
    .eq('id', obraId)
    .single();

  if (error) throw error;
  return data;
}

async function obtenerFichajesMes(obraId, mes) {
  // I1: rango del mes en hora local española (Europe/Madrid).
  // El primer día del mes a las 00:00 local y el primer día del mes siguiente a las 00:00 local,
  // luego se convierten a UTC ISO para enviar a Supabase.
  const [year, month] = mes.split('-').map(Number);
  const desde = new Date(year, month - 1, 1, 0, 0, 0, 0);
  const hasta = new Date(year, month, 1, 0, 0, 0, 0);
  const inicio = desde.toISOString();
  const fin = hasta.toISOString();

  // Intento 1: con join a empresa
  let { data, error } = await sb
    .from('fichajes')
    .select(`
      id,
      tipo,
      hora,
      trabajador_id,
      trabajador:trabajador_id(
        id,
        nombre,
        apellidos,
        dni,
        categoria,
        precio_hora_personalizado,
        empresa:empresa_id(nombre)
      )
    `)
    .eq('obra_id', obraId)
    .gte('hora', inicio)
    .lt('hora', fin)
    .order('hora', { ascending: true });

  if (!error) return data || [];

  // Fallback: sin empresa (por si el FK no existe en algún entorno)
  const fallback = await sb
    .from('fichajes')
    .select(`
      id,
      tipo,
      hora,
      trabajador_id,
      trabajador:trabajador_id(
        id,
        nombre,
        apellidos,
        dni,
        categoria,
        precio_hora_personalizado
      )
    `)
    .eq('obra_id', obraId)
    .gte('hora', inicio)
    .lt('hora', fin)
    .order('hora', { ascending: true });

  if (fallback.error) throw fallback.error;
  return fallback.data || [];
}

// =====================================================================
// Helpers locales
// =====================================================================

function descargarBuffer(buffer, filename) {
  const blob = new Blob([buffer], {
    type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
  });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  setTimeout(() => window.URL.revokeObjectURL(url), 1000);
}

function limpiarNombreArchivo(txt) {
  return String(txt || 'archivo')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function mesActual() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function mostrarError(msg) {
  const el = document.getElementById('error-correccion');
  el.textContent = msg;
  el.style.display = 'block';
}

function mostrarErrorManual(msg) {
  const el = document.getElementById('error-manual');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('ok-manual').style.display = 'none';
}

function esc(txt) {
  const d = document.createElement('div');
  d.textContent = String(txt || '');
  return d.innerHTML;
}

function formatFechaHora(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' }) + ' ' +
         d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

function fechaHoy() {
  return new Date().toISOString().split('T')[0];
}

function horaAhora() {
  const d = new Date();
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

name: e-Coordina · sincronización diaria

# De momento solo ejecución MANUAL para probar el Hito 2.
# El cron diario lo activaremos cuando confirmemos que el volcado va bien.
on:
  workflow_dispatch:

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Instalar navegador de Playwright
        run: npx playwright install --with-deps chromium

      - name: 1) Descargar CSV de e-Coordina
        env:
          ECOORDINA_USER: ${{ secrets.ECOORDINA_USER }}
          ECOORDINA_PASS: ${{ secrets.ECOORDINA_PASS }}
        run: npm run download

      - name: 2) Volcar estados a Supabase
        env:
          SUPABASE_EMAIL: ${{ secrets.SUPABASE_EMAIL }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: npm run sync

      - name: Subir CSV y capturas (siempre)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultado-sync
          path: |
            output/
            debug/
          if-no-files-found: warn

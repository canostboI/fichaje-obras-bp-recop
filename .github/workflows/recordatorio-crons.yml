name: Recordatorio · cambio de hora en crons

# MJ-23 (auditoría usabilidad): los crons van en UTC pero España cambia
# de hora dos veces al año. Este workflow abre una issue automática:
#   · 1 de OCTUBRE  → recordar ATRASAR los crons (invierno, UTC+1)
#   · 1 de MARZO    → recordar ADELANTAR los crons (verano, UTC+2)
# El cambio real de hora es el último domingo del mes: la issue llega
# con margen de sobra.
# Minuto "raro" a propósito (congestión de GitHub Actions).
# También se puede lanzar a mano desde la pestaña Actions.

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 1 10 *'   # 1 de octubre
    - cron: '17 6 1 3 *'    # 1 de marzo

permissions:
  issues: write

jobs:
  recordar:
    runs-on: ubuntu-latest
    steps:
      - name: Abrir issue recordatorio
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MES=$(date -u +'%m')

          if [ "$MES" = "10" ]; then
            TITULO="🕐 Cambio de hora (INVIERNO): atrasar los crons — $(date -u +'%Y')"
            DIRECCION="España pasa a **UTC+1** el último domingo de octubre. Hay que sumar **+1 hora** a todos los crons UTC para que sigan corriendo a la misma hora española."
            TABLA="| Cron | Ahora (verano) | Cambiar a (invierno) |
          |------|----------------|----------------------|
          | GitHub · \`ecoordina.yml\` | \`43 1 * * 1-5\` | \`43 2 * * 1-5\` |
          | pg_cron · \`autocierre_nocturno\` | \`30 22 * * *\` | \`30 23 * * *\` |
          | pg_cron · \`aviso_ronda_1\` | \`30 7 * * 1-5\` | \`30 8 * * 1-5\` |
          | pg_cron · \`aviso_ronda_2\` | \`0 8 * * 1-5\` | \`0 9 * * 1-5\` |
          | pg_cron · \`aviso_ronda_3\` | \`0 9 * * 1-5\` | \`0 10 * * 1-5\` |"
          else
            TITULO="🕑 Cambio de hora (VERANO): adelantar los crons — $(date -u +'%Y')"
            DIRECCION="España pasa a **UTC+2** el último domingo de marzo. Hay que restar **-1 hora** a todos los crons UTC para que sigan corriendo a la misma hora española."
            TABLA="| Cron | Ahora (invierno) | Cambiar a (verano) |
          |------|------------------|--------------------|
          | GitHub · \`ecoordina.yml\` | \`43 2 * * 1-5\` | \`43 1 * * 1-5\` |
          | pg_cron · \`autocierre_nocturno\` | \`30 23 * * *\` | \`30 22 * * *\` |
          | pg_cron · \`aviso_ronda_1\` | \`30 8 * * 1-5\` | \`30 7 * * 1-5\` |
          | pg_cron · \`aviso_ronda_2\` | \`0 9 * * 1-5\` | \`0 8 * * 1-5\` |
          | pg_cron · \`aviso_ronda_3\` | \`0 10 * * 1-5\` | \`0 9 * * 1-5\` |"
          fi

          CUERPO="$DIRECCION

          El cambio real es el **último domingo de este mes**. Hacer el ajuste ese fin de semana (o el lunes siguiente).

          ## Checklist

          $TABLA

          **Cómo:**
          - [ ] \`ecoordina.yml\`: editar la línea \`cron:\` en el repo.
          - [ ] pg_cron (los 4): en Supabase → SQL Editor, un \`SELECT cron.alter_job(jobid, schedule => '...')\` por cada uno, o desde la UI de Integrations → Cron.
          - [ ] Verificar al día siguiente que la sync nocturna y los SMS de ronda llegan a su hora española habitual.

          _Issue creada automáticamente por \`recordatorio-crons.yml\` (MJ-23)._"

          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "$TITULO" \
            --body "$CUERPO" \
            --label "cambio-hora" || \
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "$TITULO" \
            --body "$CUERPO"

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Nueva contraseña — Fichaje Obras</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --azul: #1e3a5f;
    --gris-fondo: #f4f6f8;
    --gris-borde: #d0d7de;
    --rojo: #c0392b;
    --verde: #1e7e34;
    --texto: #1a1a1a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--gris-fondo);
    color: var(--texto);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tarjeta {
    background: white;
    border-radius: 16px;
    padding: 40px 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    margin: 20px;
  }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--azul);
    margin: 0 0 4px;
  }
  .logo p {
    font-size: 13px;
    color: #888;
    margin: 0;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  input {
    width: 100%;
    font-size: 16px;
    padding: 13px 14px;
    border: 2px solid var(--gris-borde);
    border-radius: 10px;
    font-family: inherit;
    margin-bottom: 18px;
  }
  input:focus {
    outline: none;
    border-color: var(--azul);
  }
  button {
    width: 100%;
    font-size: 17px;
    font-weight: 600;
    padding: 15px;
    background: var(--azul);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    margin-top: 4px;
  }
  button:disabled { background: #b0b8c1; cursor: not-allowed; }
  button:active:not(:disabled) { transform: scale(0.98); }
  .error {
    background: #fdecea;
    color: var(--rojo);
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    margin-top: 16px;
    text-align: center;
    display: none;
  }
  .aviso-ok {
    background: #e8f5e9;
    color: var(--verde);
    padding: 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    margin-top: 16px;
    text-align: center;
    display: none;
    line-height: 1.5;
  }
  .nota {
    font-size: 13px;
    color: #666;
    line-height: 1.5;
    margin: -6px 0 18px;
  }
  .enlace-cambio {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: var(--azul);
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    width: 100%;
    padding: 0;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="tarjeta">

  <div class="logo">
    <h1>Nueva contraseña</h1>
    <p>Fichaje Obras — Panel de gestión</p>
  </div>

  <!-- Estado: esperando validar el enlace -->
  <div id="vista-cargando">
    <p class="nota" style="text-align:center;">Validando el enlace…</p>
  </div>

  <!-- Estado: enlace válido, formulario -->
  <div id="vista-form" style="display:none;">
    <p class="nota">
      Escribe tu nueva contraseña. La usarás a partir de ahora para entrar.
    </p>

    <label for="pass1">Nueva contraseña (mínimo 8 caracteres)</label>
    <input type="password" id="pass1" placeholder="••••••••" autocomplete="new-password">

    <label for="pass2">Repite la contraseña</label>
    <input type="password" id="pass2" placeholder="••••••••" autocomplete="new-password">

    <button id="btn-guardar">Guardar contraseña</button>
  </div>

  <!-- Estado: enlace inválido o caducado -->
  <div id="vista-invalido" style="display:none;">
    <p class="nota">
      Este enlace no es válido o ha caducado. Vuelve a la pantalla de acceso
      y pide de nuevo la recuperación de contraseña.
    </p>
  </div>

  <div class="error" id="error-box"></div>
  <div class="aviso-ok" id="ok-box"></div>

  <button class="enlace-cambio" id="ir-login" type="button">← Ir a la pantalla de acceso</button>
</div>

<script>
// === Supabase inline ===
const SUPABASE_URL = 'https://istrnsicleopzbsrapsw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzdHJuc2ljbGVvcHpic3JhcHN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTIxMTYsImV4cCI6MjA5MTM4ODExNn0.5UXV2LWPXmbfLI7rKpZSG9YBzZsesjckHnhQabA0mTY';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const vistaCargando = document.getElementById('vista-cargando');
const vistaForm     = document.getElementById('vista-form');
const vistaInvalido = document.getElementById('vista-invalido');
const errorBox = document.getElementById('error-box');
const okBox    = document.getElementById('ok-box');
const pass1El  = document.getElementById('pass1');
const pass2El  = document.getElementById('pass2');
const btnGuardar = document.getElementById('btn-guardar');

document.getElementById('ir-login').addEventListener('click', () => {
  window.location.href = './';
});

function mostrarError(msg) {
  okBox.style.display = 'none';
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
}

function mostrarOk(msg) {
  errorBox.style.display = 'none';
  okBox.textContent = msg;
  okBox.style.display = 'block';
}

// Al abrir el enlace del correo, supabase-js procesa el token de la URL
// y crea una sesión temporal de recuperación. Esperamos a que eso ocurra.
let sesionLista = false;

sb.auth.onAuthStateChange((evento, sesion) => {
  if (sesion && !sesionLista) {
    sesionLista = true;
    vistaCargando.style.display = 'none';
    vistaInvalido.style.display = 'none';
    vistaForm.style.display = 'block';
  }
});

// Si en unos segundos no hay sesión, el enlace no es válido o caducó
setTimeout(async () => {
  if (sesionLista) return;
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    sesionLista = true;
    vistaCargando.style.display = 'none';
    vistaForm.style.display = 'block';
  } else {
    vistaCargando.style.display = 'none';
    vistaInvalido.style.display = 'block';
  }
}, 4000);

pass2El.addEventListener('keypress', e => {
  if (e.key === 'Enter') btnGuardar.click();
});

btnGuardar.addEventListener('click', async () => {
  errorBox.style.display = 'none';
  const p1 = pass1El.value;
  const p2 = pass2El.value;

  if (p1.length < 8) {
    mostrarError('La contraseña debe tener al menos 8 caracteres.');
    return;
  }
  if (p1 !== p2) {
    mostrarError('Las dos contraseñas no coinciden.');
    return;
  }

  btnGuardar.disabled = true;

  const { error } = await sb.auth.updateUser({ password: p1 });

  if (error) {
    btnGuardar.disabled = false;
    mostrarError('No se pudo guardar: ' + error.message);
    return;
  }

  // Cerrar la sesión de recuperación para que entre ya con la nueva
  await sb.auth.signOut();

  vistaForm.style.display = 'none';
  mostrarOk('✅ Contraseña guardada. Ya puedes entrar con ella desde la pantalla de acceso.');
});
</script>
</body>
</html>
